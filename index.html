<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>OSRS Flipper — Live Margins</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://prices.runescape.wiki" />
<link rel="preconnect" href="https://oldschool.runescape.wiki" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23fcd34d'/><stop offset='1' stop-color='%23f59e0b'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='url(%23g)'/><text x='16' y='23' text-anchor='middle' font-family='Arial,sans-serif' font-weight='900' font-size='22' fill='%232a1a00'>G</text></svg>" />
<style>
  :root {
    --bg: #0a0d12;
    --bg-grad: radial-gradient(1200px 600px at 20% -10%, #15203a 0%, transparent 60%),
               radial-gradient(900px 500px at 100% 0%, #2a1430 0%, transparent 55%),
               #0a0d12;
    --panel: rgba(22, 27, 36, 0.72);
    --panel-solid: #161b24;
    --panel-2: rgba(28, 35, 46, 0.6);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #e8edf5;
    --muted: #8a93a3;
    --dim: #5d6573;
    --green: #4ade80;
    --green-soft: rgba(74, 222, 128, 0.12);
    --red: #f87171;
    --red-soft: rgba(248, 113, 113, 0.12);
    --yellow: #fbbf24;
    --accent: #7dd3fc;
    --accent-2: #c4b5fd;
    --gold: #fcd34d;
    --shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Inter", Roboto, sans-serif;
    font-size: 13px; line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body { background: var(--bg-grad); min-height: 100vh; }
  ::selection { background: rgba(125,211,252,0.35); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 50;
    padding: 12px 22px;
    background: rgba(10, 13, 18, 0.88);
    backdrop-filter: saturate(140%) blur(12px);
    -webkit-backdrop-filter: saturate(140%) blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 14px; align-items: center;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 100%);
    display: grid; place-items: center; font-weight: 800; color: #2a1a00; font-size: 16px;
    box-shadow: 0 4px 12px rgba(245, 158, 11, 0.35);
  }
  .brand h1 {
    margin: 0; font-size: 16px; font-weight: 700; letter-spacing: -0.01em;
    background: linear-gradient(90deg, #ffffff, #c4b5fd);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-left: 16px; }
  .tab {
    background: transparent; border: 1px solid transparent;
    color: var(--muted); padding: 6px 14px; border-radius: 8px;
    font: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .15s;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .tab.active {
    color: var(--text);
    background: rgba(125,211,252,0.1);
    border-color: rgba(125,211,252,0.3);
  }
  .tab-pane[hidden] { display: none; }

  .status-wrap { display: flex; align-items: center; gap: 14px; margin-left: auto; }
  .status { color: var(--muted); font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 var(--green); animation: pulse 2s infinite; }
  .dot.warn { background: var(--yellow); }
  .dot.err  { background: var(--red); }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 currentColor; } 70% { box-shadow: 0 0 0 8px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }

  .refresh-ring {
    --p: 0;
    width: 26px; height: 26px; border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--p) * 1%), rgba(255,255,255,0.08) 0);
    display: grid; place-items: center; position: relative;
  }
  .refresh-ring::before { content: ""; position: absolute; inset: 3px; border-radius: 50%; background: var(--panel-solid); }
  .refresh-ring span { position: relative; font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* CONTROLS */
  .controls {
    display: flex; flex-wrap: wrap; gap: 8px 10px; padding: 12px 22px;
    background: var(--panel); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 56px; z-index: 40;
  }
  .field {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 5px 12px; font-size: 12px; color: var(--muted);
    transition: border-color .15s, background .15s;
  }
  .field:focus-within { border-color: var(--accent); background: rgba(125,211,252,0.06); }
  .field label { color: var(--muted); white-space: nowrap; }
  .field input, .field select {
    background: transparent; border: 0; outline: 0; color: var(--text);
    font: inherit; padding: 0; width: 84px;
  }
  .field.search input { width: 180px; }
  .field input::placeholder { color: var(--dim); }
  .field.check { cursor: pointer; user-select: none; padding-left: 8px; }
  .field.check input { width: auto; accent-color: var(--accent); }
  .field.wide input { width: 130px; }

  /* MAIN */
  main { padding: 18px 22px 32px; position: relative; z-index: 1; }
  section { margin-bottom: 20px; }
  .section-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .section-header h2 {
    margin: 0; font-size: 11px; color: var(--muted); font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .section-header .hint { color: var(--dim); font-size: 11px; }

  /* CASH PANEL */
  .cash-panel {
    background: linear-gradient(180deg, rgba(252, 211, 77, 0.06), rgba(245, 158, 11, 0.02));
    border: 1px solid rgba(252, 211, 77, 0.18);
    border-radius: 14px;
    padding: 14px 18px;
    margin-bottom: 18px;
  }
  .cash-panel h3 { margin: 0 0 6px; font-size: 12px; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; }
  .cash-panel .summary { display: flex; align-items: baseline; gap: 24px; flex-wrap: wrap; margin: 8px 0 4px; }
  .cash-panel .summary .stat { padding: 0; background: transparent; }
  .cash-panel .summary .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .cash-panel .summary .value { font-size: 18px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .cash-panel .summary .value.gold { color: var(--gold); }
  .cash-panel .summary .value.green { color: var(--green); }
  .slot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; margin-top: 10px; }
  .slot-card {
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    display: flex; align-items: center; gap: 8px;
    transition: border-color .15s, transform .15s;
    cursor: pointer;
  }
  .slot-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .slot-card .num { color: var(--gold); font-weight: 700; font-size: 13px; min-width: 16px; text-align: center; }
  .slot-card .icon-wrap { width: 26px; height: 26px; border-radius: 6px; background: rgba(255,255,255,0.04); display: grid; place-items: center; flex-shrink: 0; overflow: hidden; }
  .slot-card .icon-wrap img { width: 24px; height: 24px; object-fit: contain; }
  .slot-card .info { flex: 1; min-width: 0; }
  .slot-card .info .name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot-card .info .sub { font-size: 10.5px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .slot-card.empty { opacity: 0.4; cursor: default; }
  .slot-card.empty:hover { border-color: var(--border); transform: none; }
  .slot-card .info .sub.green { color: var(--green); }
  .slot-card .info .sub.cap { color: var(--yellow); }

  /* TOP CARDS */
  .top-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
  .card {
    background: linear-gradient(180deg, rgba(28,35,46,0.7), rgba(22,27,36,0.7));
    border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; position: relative; overflow: hidden;
    transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--border-strong); box-shadow: var(--shadow); }
  .card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, var(--green), #22c55e);
    opacity: 0.7;
  }
  .card .row { display: flex; align-items: center; gap: 10px; }
  .card .icon-wrap {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(255,255,255,0.04); display: grid; place-items: center;
    flex-shrink: 0; overflow: hidden;
  }
  .card .icon-wrap img { width: 32px; height: 32px; object-fit: contain; }
  .card .name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .margin { color: var(--green); font-size: 18px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
  .card .sub { color: var(--muted); font-size: 11px; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .card.empty::before { display: none; }
  .card.empty { text-align: center; color: var(--muted); padding: 20px; cursor: default; }
  .card.empty:hover { transform: none; }

  /* TABLE */
  .table-wrap {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; backdrop-filter: blur(8px);
  }
  .table-scroll { max-height: calc(100vh - 380px); min-height: 320px; overflow: auto; }
  table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
  thead th {
    position: sticky; top: 0; z-index: 2;
    background: rgba(16, 20, 28, 0.95);
    backdrop-filter: blur(6px);
    color: var(--muted); font-weight: 600; text-align: right;
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    transition: color .15s;
  }
  thead th:hover { color: var(--text); }
  thead th.left { text-align: left; }
  thead th.sorted { color: var(--accent); }
  thead th.sorted::after { content: " ↓"; }
  thead th.sorted.asc::after { content: " ↑"; }

  tbody td {
    padding: 7px 12px; text-align: right;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background .12s;
  }
  tbody td.left { text-align: left; }
  tbody tr { transition: background .12s; cursor: pointer; }
  tbody tr:hover td { background: rgba(125,211,252,0.04); }
  tbody tr:last-child td { border-bottom: 0; }

  .item-cell { display: flex; align-items: center; gap: 10px; min-width: 220px; }
  .item-cell .icon-wrap { width: 26px; height: 26px; border-radius: 6px; background: rgba(255,255,255,0.04); display: grid; place-items: center; flex-shrink: 0; overflow: hidden; }
  .item-cell .icon-wrap img { width: 24px; height: 24px; object-fit: contain; }
  .item-cell .item-name { font-weight: 500; }

  .pos { color: var(--green); font-weight: 600; }
  .neg { color: var(--red); font-weight: 600; }
  .dim { color: var(--dim); }
  .stale { color: var(--yellow); }

  .badge { display: inline-block; font-size: 9.5px; padding: 1px 6px; border-radius: 999px; margin-left: 6px; vertical-align: middle; font-weight: 600; letter-spacing: 0.04em; }
  .badge.p { background: rgba(196, 181, 253, 0.16); color: #c4b5fd; }
  .badge.f { background: rgba(74, 222, 128, 0.14); color: #7ee787; }

  /* Tier pills */
  .tier-pill { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px; margin-left: 6px; vertical-align: middle; font-weight: 600; white-space: nowrap; }
  .tier-chip { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 2px 7px; border-radius: 999px; font-weight: 600; }
  .tier-hot   { background: rgba(248, 113, 113, 0.16); color: #fca5a5; }
  .tier-solid { background: rgba(74, 222, 128, 0.14); color: #86efac; }
  .tier-whale { background: rgba(252, 211, 77, 0.16); color: #fcd34d; }
  .tier-risky { background: rgba(251, 191, 36, 0.14); color: #fbbf24; }
  .tier-dead  { background: rgba(148, 163, 184, 0.14); color: #94a3b8; }
  .tier-suspect { background: rgba(248, 113, 113, 0.2); color: #fca5a5; }
  .tier-toppy   { background: rgba(248, 113, 113, 0.18); color: #fca5a5; }
  .card.tier-toppy::before { background: linear-gradient(180deg, #f87171, #dc2626); }

  /* Drop-risk pill ("vs 24h average") */
  .risk-pill {
    display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px;
    margin-left: 6px; vertical-align: middle; font-weight: 700; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .risk-pill.risk-high     { background: rgba(248, 113, 113, 0.18); color: #fca5a5; }
  .risk-pill.risk-elevated { background: rgba(251, 191, 36, 0.16); color: #fbbf24; }
  .risk-pill.risk-fair     { background: rgba(148, 163, 184, 0.14); color: #94a3b8; }
  .risk-pill.risk-discount { background: rgba(74, 222, 128, 0.18); color: #86efac; }
  .risk-pill.risk-deal     { background: rgba(34, 197, 94, 0.28); color: #4ade80; box-shadow: 0 0 8px rgba(74, 222, 128, 0.25); }
  .fee-pill { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px; margin-left: 6px; vertical-align: middle; font-weight: 700; white-space: nowrap; background: rgba(248, 113, 113, 0.18); color: #fca5a5; }

  /* Stability bar (per-row) */
  .stab-bar { display: inline-flex; align-items: center; gap: 6px; font-variant-numeric: tabular-nums; min-width: 70px; justify-content: flex-end; }
  .stab-track { width: 40px; height: 6px; border-radius: 3px; background: rgba(255,255,255,0.07); overflow: hidden; }
  .stab-fill { height: 100%; border-radius: 3px; transition: width .2s; }
  .stab-fill.s-low  { background: var(--red); }
  .stab-fill.s-mid  { background: var(--yellow); }
  .stab-fill.s-high { background: var(--green); }
  .stab-num { font-size: 11px; font-weight: 600; min-width: 20px; text-align: right; }

  /* Strategy selector — visually emphasized */
  .field.strategy { background: rgba(125, 211, 252, 0.08); border-color: rgba(125, 211, 252, 0.3); }
  .field.strategy select { color: var(--text); font-weight: 600; }

  /* Outlook chip — directional momentum */
  .outlook-pill {
    display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px;
    margin-left: 6px; vertical-align: middle; font-weight: 700; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .outlook-rising  { background: rgba(74, 222, 128, 0.20); color: #86efac; }
  .outlook-warming { background: rgba(125, 211, 252, 0.16); color: #7dd3fc; }
  .outlook-falling { background: rgba(248, 113, 113, 0.18); color: #fca5a5; }
  .outlook-cooling { background: rgba(251, 191, 36, 0.16); color: #fbbf24; }
  .outlook-brewing { background: linear-gradient(135deg, rgba(125,211,252,0.25), rgba(196,181,253,0.20)); color: #c4b5fd; box-shadow: 0 0 8px rgba(196, 181, 253, 0.3); }

  /* Volume surge chip — "this is moving abnormally right now" */
  .surge-pill {
    display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px;
    margin-left: 6px; vertical-align: middle; font-weight: 700; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .surge-mega  { background: linear-gradient(135deg, rgba(248,113,113,0.25), rgba(252,211,77,0.22)); color: #fcd34d; box-shadow: 0 0 10px rgba(252, 211, 77, 0.35); }
  .surge-high  { background: rgba(252, 211, 77, 0.16); color: #fcd34d; }
  .surge-mid   { background: rgba(125, 211, 252, 0.14); color: #7dd3fc; }

  /* Velocity chip — direction-of-move in the last few minutes */
  .vel-pill {
    display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px;
    margin-left: 6px; vertical-align: middle; font-weight: 700; white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .vel-up    { background: rgba(74, 222, 128, 0.18); color: #86efac; }
  .vel-up-fast { background: linear-gradient(135deg, rgba(74,222,128,0.28), rgba(252,211,77,0.18)); color: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.35); }
  .vel-dn    { background: rgba(248, 113, 113, 0.18); color: #fca5a5; }
  .vel-dn-fast { background: linear-gradient(135deg, rgba(248,113,113,0.28), rgba(252,211,77,0.18)); color: #f87171; }

  /* Multi-timeframe confirmation badge */
  .mtf-pill {
    display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 999px;
    margin-left: 6px; vertical-align: middle; font-weight: 700; white-space: nowrap;
    background: linear-gradient(135deg, rgba(196,181,253,0.22), rgba(125,211,252,0.18));
    color: #c4b5fd;
  }

  /* ===== LIVE GE WATCHER ===== */
  .watcher-panel {
    background: linear-gradient(180deg, rgba(125, 211, 252, 0.06), rgba(56, 189, 248, 0.02));
    border: 1px solid rgba(125, 211, 252, 0.22);
    border-radius: 14px;
    padding: 12px 16px;
    margin-bottom: 18px;
  }
  .watcher-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .watcher-header h3 { margin: 0; font-size: 12px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
  .watcher-status { color: var(--muted); font-size: 11px; flex: 1; }
  .watcher-status.live { color: var(--green); }
  .watcher-status.changed { color: var(--gold); font-weight: 700; }
  .watcher-btn {
    background: rgba(125, 211, 252, 0.14);
    border: 1px solid rgba(125, 211, 252, 0.3);
    color: var(--accent);
    font: inherit; font-size: 11px; font-weight: 600;
    padding: 4px 12px; border-radius: 999px;
    cursor: pointer;
    transition: filter .12s, transform .1s;
  }
  .watcher-btn:hover { filter: brightness(1.2); transform: translateY(-1px); }
  .watcher-btn.danger { background: rgba(248, 113, 113, 0.14); border-color: rgba(248, 113, 113, 0.3); color: #fca5a5; }

  .watcher-body { margin-top: 12px; display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
  .watcher-thumb-wrap {
    background: #000; border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; min-width: 240px; max-width: 480px;
    display: grid; place-items: center;
  }
  #watcher-thumb { display: block; max-width: 100%; height: auto; }
  .watcher-thumb-wrap.flash { animation: thumbFlash 1.2s ease-out 2; }
  @keyframes thumbFlash { 0%, 100% { box-shadow: 0 0 0 0 rgba(252, 211, 77, 0); } 50% { box-shadow: 0 0 16px rgba(252, 211, 77, 0.7); } }

  .watcher-meta { flex: 1; min-width: 200px; font-size: 12px; }
  .watcher-meta .row { margin: 3px 0; color: var(--muted); }
  .watcher-meta .row strong { color: var(--text); }

  /* Crop modal */
  .crop-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 200; display: grid; place-items: center;
    padding: 20px;
  }
  .crop-container {
    background: var(--panel-solid);
    border: 1px solid var(--border-strong);
    border-radius: 14px; padding: 18px;
    max-width: 90vw; max-height: 90vh;
    display: flex; flex-direction: column; gap: 12px;
  }
  .crop-container h3 { margin: 0; font-size: 14px; }
  .crop-container .hint { color: var(--muted); font-size: 11px; }
  .crop-area {
    position: relative; max-width: 80vw; max-height: 60vh;
    background: #000; border-radius: 8px; overflow: hidden;
    cursor: crosshair; user-select: none;
  }
  .crop-area video { display: block; max-width: 80vw; max-height: 60vh; pointer-events: none; }
  .crop-rect {
    position: absolute; border: 2px solid var(--gold);
    background: rgba(252, 211, 77, 0.12);
    pointer-events: none;
  }
  .crop-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .crop-actions button {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--text); padding: 6px 14px; border-radius: 8px;
    font: inherit; font-size: 12px; cursor: pointer;
  }
  .crop-actions button.primary { background: var(--gold); color: #1a1300; border: 0; font-weight: 700; }
  .crop-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Slot grid (per-slot detection) */
  .slot-watch-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 8px; margin-top: 12px;
  }
  .slot-watch-card {

  /* MAIN TABLE → CARDS on mobile */
  body.mobile-view .table-wrap { background: transparent; border: 0; }
  body.mobile-view .table-scroll { max-height: none; overflow: visible; }
  body.mobile-view #tbl,
  body.mobile-view #tbl tbody { display: block; }
  body.mobile-view #tbl thead { display: none; }
  body.mobile-view #tbl tbody tr {
    display: grid;
    grid-template-columns: auto 1fr;
    grid-template-areas:
      "star item"
      "buy  sell"
      "net  perhr"
      "extra extra";
    column-gap: 8px; row-gap: 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  body.mobile-view #tbl tbody tr:hover td { background: transparent; }
  body.mobile-view #tbl tbody td { display: block; padding: 0; border: 0; text-align: left; }
  body.mobile-view #tbl tbody td:nth-child(1) { grid-area: star; }       /* star */
  body.mobile-view #tbl tbody td:nth-child(2) { grid-area: item; }       /* item cell */
  body.mobile-view #tbl tbody td:nth-child(3),
  body.mobile-view #tbl tbody td:nth-child(4),
  body.mobile-view #tbl tbody td:nth-child(8),
  body.mobile-view #tbl tbody td:nth-child(9),
  body.mobile-view #tbl tbody td:nth-child(10),
  body.mobile-view #tbl tbody td:nth-child(11),
  body.mobile-view #tbl tbody td:nth-child(13),
  body.mobile-view #tbl tbody td:nth-child(14),
  body.mobile-view #tbl tbody td:nth-child(15) { display: none; }
  body.mobile-view #tbl tbody td:nth-child(5) { grid-area: buy; }        /* Buy@ */
  body.mobile-view #tbl tbody td:nth-child(6) { grid-area: sell; }       /* Sell@ */
  body.mobile-view #tbl tbody td:nth-child(7) { grid-area: net;          /* Net */
    font-size: 13px; font-weight: 700; padding-top: 4px;
  }
  body.mobile-view #tbl tbody td:nth-child(7)::before { content: "Net "; color: var(--muted); font-size: 10px; font-weight: 500; }
  body.mobile-view #tbl tbody td:nth-child(12) { grid-area: perhr;       /* Est gp/hr */
    font-size: 13px; font-weight: 700; text-align: right; padding-top: 4px;
  }
  body.mobile-view #tbl tbody td:nth-child(12)::before { content: "gp/hr "; color: var(--muted); font-size: 10px; font-weight: 500; }
  body.mobile-view #tbl tbody .item-cell { min-width: 0; gap: 8px; flex-wrap: wrap; }
  body.mobile-view #tbl tbody .item-cell .item-name { font-size: 13px; }
  body.mobile-view #tbl tbody .price-pill { width: 100%; justify-content: space-between; padding: 6px 12px; }
  body.mobile-view #tbl tbody .price-pill .price-num { font-size: 14px; }
  body.mobile-view #tbl tbody .star-btn { font-size: 22px; padding: 0 4px; }
  body.mobile-view #row-count { font-size: 11px; }

  /* Simple-table mobile (alch/sets/decant/herbs) — keep horizontal scroll but smaller */
  body.mobile-view .simple-table { font-size: 11px; min-width: 600px; }
  body.mobile-view .simple-table thead th { padding: 6px 8px; font-size: 9px; }
  body.mobile-view .simple-table tbody td { padding: 6px 8px; }

  /* News panel */
  body.mobile-view .news-panel { padding: 10px 12px; }

  /* Modal */
  body.mobile-view .modal { padding: 14px; max-height: 95vh; }
  body.mobile-view .modal-stats { grid-template-columns: 1fr 1fr; }
  body.mobile-view .chart-wrap svg { height: 180px; }

  /* DESKTOP VIEW small tweaks — when explicitly desktop, disable any auto-stacking */
  body.desktop-view .mobile-filter-bar { display: none; }
</head>

<script>
  const API = "https://prices.runescape.wiki/api/v1/osrs";
  const ICON_BASE = "https://oldschool.runescape.wiki/w/Special:Filepath/";
  const JAGEX_GRAPH = "https://secure.runescape.com/m=itemdb_oldschool/api/graph/";
  const CORS_PROXY = "https://corsproxy.io/?";
  const FAST_REFRESH_MS = 6000;   // /latest poll
  const MID_REFRESH_MS = 30000;   // /5m poll
  const SLOW_REFRESH_MS = 60000;  // /1h + /24h poll
  const HISTORY_LIMIT = 60;       // in-memory ticks per item (~6 min @ 6s)
  const NATURE_RUNE_ID = 561;
  const ALCH_CASTS_PER_HR = 1200;

  // Hardcoded armor sets: setId -> { name, partIds }
  const ARMOR_SETS = {
    11890: { name: "Bandos armour set",     parts: [11832, 11834] },
    11894: { name: "Armadyl armour set",    parts: [11826, 11828, 11830] },
    11892: { name: "Dharok's armour set",   parts: [4716, 4720, 4722, 4718] },
    11924: { name: "Ahrim's armour set",    parts: [4708, 4712, 4714, 4710] },
    11898: { name: "Verac's armour set",    parts: [4753, 4757, 4759, 4755] },
    11896: { name: "Torag's armour set",    parts: [4745, 4749, 4751, 4747] },
    11926: { name: "Karil's armour set",    parts: [4732, 4736, 4738, 4734] },
    11900: { name: "Guthan's armour set",   parts: [4724, 4728, 4730, 4726] },
    22438: { name: "Justiciar armour set",  parts: [22326, 22327, 22328] },
    24488: { name: "Inquisitor's armour set", parts: [24419, 24420, 24421] },
    21049: { name: "Ancestral robes set",   parts: [21018, 21021, 21024] },
    13070: { name: "3rd age melee set",     parts: [10350, 10348, 10346, 10352] },
    13068: { name: "3rd age range set",     parts: [10334, 10330, 10332, 10328] },
    13072: { name: "3rd age mage set",      parts: [10342, 10338, 10336, 10340] },
  };

  // GE tax: 2% of sell price, floored, capped at 5,000,000 gp per item.
  // Anything <50 gp naturally rounds to 0 tax. Rate changed from 1% to 2% on 2025-05-29.
  const GE_TAX_RATE = 0.02;
  const GE_TAX_CAP = 5_000_000;
  function geTax(sellPrice) {
    return Math.min(Math.floor(sellPrice * GE_TAX_RATE), GE_TAX_CAP);
  }
  function afterTax(sellPrice) { return sellPrice - geTax(sellPrice); }

  // GE tax exemption list — items that sell tax-free on the GE.
  // Source: oldschool.runescape.wiki/w/Grand_Exchange#Tax
  // Resolved to IDs lazily from /mapping so we don't have to guess.
  const TAX_EXEMPT_NAMES = new Set([
    // Bonds
    "Old school bond",
    // Tools
    "Chisel", "Gardening trowel", "Glassblowing pipe", "Hammer", "Needle",
    "Pestle and mortar", "Rake", "Saw", "Secateurs", "Seed dibber",
    "Shears", "Spade", "Watering can", "Tinderbox", "Knife",
    // Combat consumables
    "Bronze arrow", "Iron arrow", "Steel arrow",
    "Bronze dart", "Iron dart", "Steel dart",
    "Mind rune",
    // Food
    "Bass", "Bread", "Cake", "Cooked chicken", "Cooked meat", "Herring",
    "Lobster", "Mackerel", "Meat pie", "Pike", "Salmon", "Shrimps", "Tuna",
    // Energy potion — all doses
    "Energy potion(1)", "Energy potion(2)", "Energy potion(3)", "Energy potion(4)",
    // Teleport tablets
    "Ardougne teleport", "Camelot teleport", "Civitas illa fortis teleport",
    "Falador teleport", "Kourend castle teleport", "Lumbridge teleport",
    "Varrock teleport", "Teleport to house",
    // Charged jewellery (only fully-charged tradeable variants)
    "Ring of dueling(8)", "Games necklace(8)",
  ]);
  let _taxExemptIds = null;
  function getTaxExemptIds() {
    if (_taxExemptIds) return _taxExemptIds;
    _taxExemptIds = new Set();
    for (const item of Object.values(state.mapping || {})) {
      if (TAX_EXEMPT_NAMES.has(item.name)) _taxExemptIds.add(item.id);
    }
    return _taxExemptIds;
  }
  function geTaxFor(itemId, sellPrice) {
    if (getTaxExemptIds().has(+itemId)) return 0;
    return geTax(sellPrice);
  }

  // ===== EXTRA PER-ITEM FEES (e.g. bond conversion) =====
  // Bonds carry a 10% conversion fee on the buy side. Buying a bond on the GE
  // and re-listing it costs 10% of the bond's value, which makes most bond
  // flips unprofitable. Wiki: "buying a bond with GP and then immediately
  // re-selling it is usually not profitable due to the conversion fees."
  const CONVERSION_FEE_NAMES = new Map([
    ["Old school bond", 0.10],
  ]);
  let _convFees = null; // id -> fraction
  function getConvFeesByName() {
    if (_convFees) return _convFees;
    _convFees = new Map();
    for (const item of Object.values(state.mapping || {})) {
      if (CONVERSION_FEE_NAMES.has(item.name)) {
        _convFees.set(item.id, CONVERSION_FEE_NAMES.get(item.name));
      }
    }
    return _convFees;
  }
  function conversionFee(itemId, buyPrice) {
    const frac = getConvFeesByName().get(+itemId);
    if (!frac || !buyPrice) return 0;
    return Math.ceil(buyPrice * frac);
  }
  function hasConversionFee(itemId) {
    return getConvFeesByName().has(+itemId);
  }

  // ===== BUY/SELL BUMP CALCULATIONS =====
  // Cut = flat-gp floor (the minimum). Edge = % of price (scales with item size).
  // Each side is capped at 1.5% of the margin so combined worst-case bump is 3%,
  // preserving at least 97% of raw margin. Bumps round DOWN (favor your wallet).
  const PER_SIDE_MARGIN_CAP = 0.015;
  function priceCfg() {
    return {
      cut: Math.max(0, +($("#cut")?.value || 0)),
      edge: Math.max(0, +($("#edge")?.value || 0)),
    };
  }
  function buyBumpFor(low, high, cfg) {
    cfg = cfg || priceCfg();
    const margin = Math.max(0, high - low);
    const maxBump = Math.floor(margin * PER_SIDE_MARGIN_CAP);
    const pctBump = Math.floor(low * cfg.edge / 100);
    return Math.max(cfg.cut, Math.min(maxBump, pctBump));
  }
  function sellBumpFor(low, high, cfg) {
    cfg = cfg || priceCfg();
    const margin = Math.max(0, high - low);
    const maxBump = Math.floor(margin * PER_SIDE_MARGIN_CAP);
    const pctBump = Math.floor(high * cfg.edge / 100);
    return Math.max(cfg.cut, Math.min(maxBump, pctBump));
  }

  // Parse "50m", "1.5b", "250k", "1,000,000" into a number
  function parseCash(s) {
    if (typeof s !== "string") return +s || 0;
    s = s.trim().toLowerCase().replace(/,/g, "");
    if (!s) return 0;
    const m = s.match(/^([\d.]+)\s*([kmb])?$/);
    if (!m) return 0;
    let n = +m[1];
    if (m[2] === "k") n *= 1e3;
    else if (m[2] === "m") n *= 1e6;
    else if (m[2] === "b") n *= 1e9;
    return Math.round(n);
  }

  const state = {
    mapping: {},
    prices: {},          // /latest: id -> { high, low, highTime, lowTime }
    prices5m: {},        // /5m: id -> { avgHighPrice, highPriceVolume, avgLowPrice, lowPriceVolume }
    prices1h: {},        // /1h: same shape
    prices24h: {},       // /24h: same shape
    history: {},         // id -> [{ts, low, high}, ...] last HISTORY_LIMIT entries (in-memory tick history)
    velocity: {},        // id -> { lowSlope, highSlope, recentLowDelta, recentHighDelta } gp/min
    jagexCache: {},      // id -> { data: [...], ts } 180-day daily history (lazy)
    volumes: {},         // id -> { buy, sell }
    prevMargins: {},
    potionFamilies: null,
    herbFamilies: null,
    timeseriesCache: {}, // id -> { 1h: [...], 5m: [...], ts: Date }
    sortKey: "expectedHourlyProfit",
    sortDir: "desc",
    activeTab: "flipping",
    lastUpdate: null,
    nextRefreshAt: null,
    alchSort: { key: "profit", dir: "desc" },
    setsSort: { key: "bestProfit", dir: "desc" },
    decantSort: { key: "profitPerCycle", dir: "desc" },
    herbsSort: { key: "profitPer", dir: "desc" },
    watch: new Set(),    // watched item IDs
    alertTargets: {},    // id -> minimum net gp/ea that triggers an alert
    lastAlertFired: {},  // id -> timestamp (prevent spam)
    positions: {},       // id -> { buyPrice, qty, boughtAt } — your actual recorded purchases
  };

  // ===== PRICE PILL HELPER =====
  function pricePill(side, price) {
    if (price == null || !isFinite(price)) return '<span class="dim">—</span>';
    const label = side === "buy" ? "↓ BUY" : "↑ SELL";
    return `<span class="price-pill" data-side="${side}" data-price="${price}" title="Click to copy">
      <span class="price-side">${label}</span>
      <span class="price-num">${fmt(price)}</span>
    </span>`;
  }

  // ===== PERSISTENCE =====
  const LS_KEY = "osrs-flipper-v1";
  const PERSISTED_INPUTS = [
    "strategy","cash","slots","minVol","maxStale","members","cut","edge","hideZero","hideSus","search",
    "alch-search","alch-minProfit","alch-cash","alch-members",
    "sets-minProfit",
    "decant-search","decant-minProfit","decant-minVol",
    "herbs-search","herbs-minProfit","herbs-minVol",
  ];
  function saveSettings() {
    const data = {
      inputs: {},
      watch: [...state.watch],
      alertTargets: state.alertTargets,
      positions: state.positions,
      activeTab: state.activeTab,
    };
    for (const id of PERSISTED_INPUTS) {
      const el = document.getElementById(id);
      if (!el) continue;
      data.inputs[id] = el.type === "checkbox" ? el.checked : el.value;
    }
    try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch (e) {}
  }
  function loadSettings() {
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      for (const id of PERSISTED_INPUTS) {
        const el = document.getElementById(id);
        if (!el || data.inputs[id] === undefined) continue;
        if (el.type === "checkbox") el.checked = !!data.inputs[id];
        else el.value = data.inputs[id];
      }
      if (Array.isArray(data.watch)) state.watch = new Set(data.watch);
      if (data.alertTargets && typeof data.alertTargets === "object") state.alertTargets = data.alertTargets;
      if (data.positions && typeof data.positions === "object") state.positions = data.positions;
      if (data.activeTab) state.activeTab = data.activeTab;
    } catch (e) {}
  }

  // ===== WATCHLIST + ALERTS =====
  function toggleWatch(id) {
    id = +id;
    if (state.watch.has(id)) state.watch.delete(id);
    else state.watch.add(id);
    saveSettings();
    renderWatchlist();
    if (state.activeTab === "flipping") renderTable(computeRows());
  }
  function setAlertTarget(id, net) {
    id = +id;
    if (!net || net <= 0) delete state.alertTargets[id];
    else state.alertTargets[id] = +net;
    saveSettings();
  }

  // ===== POSITION TRACKING =====
  function markBought(id) {
    id = +id;
    const p = state.prices[id];
    if (!p || p.low == null || p.high == null) return;
    const cfg = priceCfg();
    const buyAt = p.low + buyBumpFor(p.low, p.high, cfg);
    // Auto-watch the item if it isn't already
    state.watch.add(id);
    state.positions[id] = { buyPrice: buyAt, qty: 1, boughtAt: Date.now() };
    saveSettings();
    renderWatchlist();
  }
  function updatePosition(id, field, value) {
    id = +id;
    const pos = state.positions[id];
    if (!pos) return;
    if (field === "buyPrice") pos.buyPrice = Math.max(0, Math.round(+value || 0));
    else if (field === "qty") pos.qty = Math.max(0, Math.round(+value || 0));
    saveSettings();
    // Don't full-rerender if user is mid-edit — but do update the advice line and pnl
    updatePositionDisplay(id);
  }
  function closePosition(id) {
    id = +id;
    delete state.positions[id];
    saveSettings();
    renderWatchlist();
  }
  function positionAdvice(id) {
    const pos = state.positions[id];
    const p = state.prices[id];
    if (!pos || !p || p.low == null || p.high == null) return null;
    const cfg = priceCfg();
    const sellAt = p.high - sellBumpFor(p.low, p.high, cfg);
    const taxOnSell = geTaxFor(id, sellAt);
    // Conversion fee is on YOUR ACTUAL buy price (what you paid), not the current Buy@
    const convFee = conversionFee(id, pos.buyPrice);
    const netPerItem = sellAt - taxOnSell - pos.buyPrice - convFee;
    const totalNet = netPerItem * pos.qty;

    // Break-even sell price (what you'd need to list at to come out even, after tax + conv fee)
    const exempt = getTaxExemptIds().has(+id);
    const breakEvenAfterFees = pos.buyPrice + convFee;
    const breakEven = exempt ? breakEvenAfterFees : Math.ceil(breakEvenAfterFees / (1 - GE_TAX_RATE));

    const d24 = state.prices24h[id];
    const avgHigh24 = d24?.avgHighPrice || 0;

    // Profit %, used for thresholds
    const pctProfit = pos.buyPrice > 0 ? (netPerItem / pos.buyPrice) * 100 : 0;

    let level, label;
    if (netPerItem >= 0) {
      // Already profitable at current sell price
      if (avgHigh24 > sellAt * 1.015 && pctProfit < 4) {
        // Could realistically wait for better
        level = "hold-profit";
        const targetList = avgHigh24 - sellBumpFor(p.low, p.high, cfg);
        label = `⏳ Hold — 24h avg sell is ${fmtCompact(avgHigh24)}, ${fmtCompact(targetList - pos.buyPrice - geTaxFor(id, targetList))} more gp/ea possible if it returns`;
      } else {
        level = "sell-now";
        label = `✓ Sell now — list at ${fmt(sellAt)} for ${fmtSigned(netPerItem)}/ea (${fmtSigned(totalNet)} total)`;
      }
    } else {
      // Underwater
      if (avgHigh24 >= breakEven * 1.005) {
        level = "hold-recover";
        label = `⏳ Hold — break-even at ${fmt(breakEven)}. 24h avg sell is ${fmtCompact(avgHigh24)} so it's been there recently.`;
      } else if (avgHigh24 > 0) {
        level = "cut-loss";
        label = `⚠ Cut losses — 24h avg sell (${fmtCompact(avgHigh24)}) is below break-even (${fmt(breakEven)}). Selling now caps loss at ${fmtSigned(netPerItem)}/ea.`;
      } else {
        level = "hold-recover";
        label = `⏳ Hold — break-even at ${fmt(breakEven)}. Need more history to judge recovery odds.`;
      }
    }
    return { level, label, netPerItem, totalNet, breakEven, sellAt, avgHigh24 };
  }
  function updatePositionDisplay(id) {
    const card = document.querySelector(`.watch-card[data-id="${id}"]`);
    if (!card) return;
    const advice = positionAdvice(id);
    if (!advice) return;
    const pnlEl = card.querySelector(".pos-pnl");
    const adviceEl = card.querySelector(".pos-advice");
    if (pnlEl) {
      pnlEl.textContent = `${fmtSigned(advice.netPerItem)}/ea · ${fmtSigned(advice.totalNet)} total`;
      pnlEl.className = "pos-pnl " + (advice.netPerItem >= 0 ? "pos" : "neg");
    }
    if (adviceEl) {
      adviceEl.className = "pos-advice level-" + advice.level;
      adviceEl.textContent = advice.label;
    }
  }

  // Simple beep via Web Audio (no external file)
  let audioCtx = null;
  function beep(freq = 880, duration = 120) {
    try {
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine"; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration/1000);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration/1000 + 0.02);
    } catch (e) {}
  }

  async function requestNotifyPermission() {
    if (!("Notification" in window)) return false;
    if (Notification.permission === "granted") return true;
    if (Notification.permission === "denied") return false;
    const p = await Notification.requestPermission();
    return p === "granted";
  }

  function fireAlert(item, msg) {
    const now = Date.now();
    const last = state.lastAlertFired[item.id] || 0;
    if (now - last < 5 * 60 * 1000) return; // throttle per item to once per 5 min
    state.lastAlertFired[item.id] = now;
    beep(); setTimeout(() => beep(660), 160);
    if ("Notification" in window && Notification.permission === "granted") {
      const n = new Notification("OSRS Flipper — " + item.name, { body: msg, icon: iconUrl(item.icon) });
      n.onclick = () => { window.focus(); n.close(); };
      setTimeout(() => n.close(), 8000);
    }
    // Visual flash on watch card
    const card = document.querySelector(`.watch-card[data-id="${item.id}"]`);
    if (card) { card.classList.add("firing"); setTimeout(() => card.classList.remove("firing"), 3500); }
  }

  function checkAlerts() {
    const cfg = priceCfg();
    for (const id of state.watch) {
      const target = state.alertTargets[id];
      if (!target) continue;
      const meta = state.mapping[id];
      const p = state.prices[id];
      if (!meta || !p || p.low == null || p.high == null) continue;
      const buyAt = p.low + buyBumpFor(p.low, p.high, cfg);
      const sellAt = Math.max(buyAt, p.high - sellBumpFor(p.low, p.high, cfg));
      const net = sellAt - geTaxFor(id, sellAt) - buyAt - conversionFee(id, buyAt);
      if (net >= target) {
        fireAlert({ id, name: meta.name, icon: meta.icon }, `Net hit ${fmtSigned(net)} gp (target ${fmtSigned(target)})`);
      }
    }
  }

  function renderWatchlist() {
    const section = $("#watchlist-section");
    if (!state.watch.size) { section.hidden = true; return; }
    section.hidden = false;
    // Don't re-render while the user is mid-edit in an alert or position input — preserves focus
    if (document.activeElement?.matches?.("[data-alert],[data-pos-price],[data-pos-qty]")) return;
    const items = [];
    const cfg = priceCfg();
    for (const id of state.watch) {
      const meta = state.mapping[id];
      const p = state.prices[id];
      if (!meta) continue;
      const vol = state.volumes[id] || { buy: 0, sell: 0 };
      const low = p?.low, high = p?.high;
      const buyAt = (low != null && high != null) ? low + buyBumpFor(low, high, cfg) : null;
      const sellAt = (low != null && high != null) ? Math.max(buyAt || 0, high - sellBumpFor(low, high, cfg)) : null;
      const net = (buyAt != null && sellAt != null) ? (sellAt - geTaxFor(id, sellAt) - buyAt - conversionFee(id, buyAt)) : null;
      const target = state.alertTargets[id] || "";
      const pos = state.positions[id];

      if (pos) {
        // POSITION OPEN — show cost basis, live P&L, recommendation
        const advice = positionAdvice(id);
        items.push(`
          <div class="watch-card has-position" data-id="${id}">
            <div class="head">
              <div class="icon-wrap">${iconImg(meta.icon, 26)}</div>
              <div class="name" data-open="${id}">${escapeHtml(meta.name)}<span class="badge ${meta.members ? 'p' : 'f'}">${meta.members ? 'P' : 'F'}</span></div>
              <button class="star-btn on" data-star="${id}" title="Unwatch">★</button>
            </div>
            <div class="pos-row">
              <span>Bought</span>

              <span>×</span>
              <input type="number" class="pos-qty-input" data-pos-qty="${id}" value="${pos.qty}" />
              <button class="pos-close-btn" data-pos-close="${id}" title="Close position">✕</button>
            </div>
            <div class="pos-status">
              <span>Now ${pricePill("sell", sellAt)}</span>
              <span class="pos-pnl ${advice && advice.netPerItem >= 0 ? 'pos' : 'neg'}">${advice ? `${fmtSigned(advice.netPerItem)}/ea · ${fmtSigned(advice.totalNet)} total` : "—"}</span>
            </div>
            <div class="pos-advice level-${advice ? advice.level : 'hold-recover'}">${advice ? advice.label : "Waiting for current price…"}</div>
          </div>`);
      } else {
        // NO POSITION YET — standard watch card with "Mark bought" button
        items.push(`
          <div class="watch-card" data-id="${id}">
            <div class="head">
              <div class="icon-wrap">${iconImg(meta.icon, 26)}</div>
              <div class="name" data-open="${id}">${escapeHtml(meta.name)}<span class="badge ${meta.members ? 'p' : 'f'}">${meta.members ? 'P' : 'F'}</span></div>
              <button class="star-btn on" data-star="${id}" title="Unwatch">★</button>
            </div>
            <div class="row">
              ${pricePill("buy", buyAt)}
              ${pricePill("sell", sellAt)}
            </div>
            <div class="meta">
              <span>Net <strong style="color:${net > 0 ? 'var(--green)' : 'var(--muted)'}">${fmtSigned(net)}</strong>/ea · buy ${fmtCompact(vol.buy)}/hr · sell ${fmtCompact(vol.sell)}/hr</span>
              <span>Alert ≥ <input type="number" class="alert-input" data-alert="${id}" value="${target}" placeholder="net gp" /></span>
            </div>
            <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center;gap:8px">
              ${buyAt != null ? `<button class="mark-bought-btn" data-mark-bought="${id}">📌 I bought @ ${fmt(buyAt)}</button>` : '<span class="dim">—</span>'}
            </div>
          </div>`);
      }
    }
    $("#watchlist-grid").innerHTML = items.join("") || '<div class="watchlist-empty">No watched items yet — click ☆ on any row to add it here.</div>';
  }

  // ===== HERB FAMILIES =====
  function buildHerbFamilies() {
    // Match "Grimy X" → "X" or "Clean X"
    const fam = {};
    for (const item of Object.values(state.mapping)) {
      const m = item.name.match(/^Grimy (.+)$/);
      if (m) {
        const base = m[1];
        fam[base] = fam[base] || { name: base };
        fam[base].grimyId = item.id;
        fam[base].limit = item.limit;
      }
    }
    // Find the clean counterpart (just the herb name, or "Clean X")
    for (const item of Object.values(state.mapping)) {
      for (const [base, f] of Object.entries(fam)) {
        if (item.name === base || item.name === "Clean " + base) {
          f.cleanId = item.id;
          f.icon = item.icon;
          f.members = item.members;
        }
      }
    }
    const result = {};
    for (const [base, f] of Object.entries(fam)) {
      if (f.grimyId && f.cleanId) result[base] = f;
    }
    return result;
  }
  function computeHerbsRows() {
    if (!state.herbFamilies) state.herbFamilies = buildHerbFamilies();
    const search = $("#herbs-search").value.trim().toLowerCase();
    const minProfit = +$("#herbs-minProfit").value || 0;
    const minVol = +$("#herbs-minVol").value || 0;
    const cfg = priceCfg();
    const rows = [];
    for (const f of Object.values(state.herbFamilies)) {
      if (search && !f.name.toLowerCase().includes(search)) continue;
      const pG = state.prices[f.grimyId], pC = state.prices[f.cleanId];
      if (!pG || !pC || pG.low == null || pC.high == null) continue;
      const buyGrimy = pG.low + buyBumpFor(pG.low, pG.high ?? pG.low, cfg);
      const sellClean = pC.high - sellBumpFor(pC.low ?? pC.high, pC.high, cfg);
      const profitPer = sellClean - geTaxFor(f.cleanId, sellClean) - buyGrimy;
      if (profitPer < minProfit || profitPer <= 0) continue;

      const vG = state.volumes[f.grimyId] || { buy: 0, sell: 0 };
      const vC = state.volumes[f.cleanId] || { buy: 0, sell: 0 };
      if (Math.min(vG.buy, vC.sell) < minVol) continue;

      const limit = f.limit || 0;
      const limitPerHour = limit > 0 ? limit / 4 : Infinity;
      // Cleaning is 1 tick per herb = up to 6000/hr. Realistic is volume-limited anyway.
      const throughput = Math.min(vG.buy, vC.sell, limitPerHour);
      const gpHr = throughput * profitPer;
      const roi = buyGrimy > 0 ? (profitPer / buyGrimy) * 100 : 0;

      rows.push({
        name: f.name, icon: f.icon, members: f.members,
        grimyId: f.grimyId, cleanId: f.cleanId,
        buyGrimy, sellClean, profitPer, roi, limit,
        volGrimy: vG.buy, volClean: vC.sell, gpHr,
      });
    }
    const { key, dir } = state.herbsSort;
    rows.sort((a,b) => {
      let av = a[key], bv = b[key];
      if (typeof av === "string") { av = av.toLowerCase(); bv = bv.toLowerCase(); }
      if (av < bv) return dir === "asc" ? -1 : 1;
      if (av > bv) return dir === "asc" ? 1 : -1;
      return 0;
    });
    return rows;
  }
  function renderHerbsTab() {
    const rows = computeHerbsRows();
    const html = rows.map(r => `
      <tr data-id="${r.grimyId}">
        <td class="left">
          <div class="item-cell">
            <div class="icon-wrap">${iconImg(r.icon, 24)}</div>
            <div><span class="item-name">${escapeHtml(r.name)}</span><span class="badge ${r.members ? 'p' : 'f'}">${r.members ? 'P' : 'F'}</span></div>
          </div>
        </td>
        <td>${pricePill("buy", r.buyGrimy)}</td>
        <td>${pricePill("sell", r.sellClean)}</td>
        <td class="pos"><strong>${fmtSigned(r.profitPer)}</strong></td>
        <td class="${r.roi > 0 ? 'pos' : 'dim'}">${r.roi.toFixed(1)}</td>
        <td class="dim">${r.limit ? fmt(r.limit) : '—'}</td>
        <td>${fmt(r.volGrimy)}</td>
        <td>${fmt(r.volClean)}</td>
        <td class="pos"><strong>${fmtCompact(r.gpHr)}</strong></td>
      </tr>`).join("");
    $("#herbs-rows").innerHTML = html || '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px">No profitable herb cleans right now.</td></tr>';

    document.querySelectorAll("#herbs-tbl thead th").forEach(th => {
      th.classList.remove("sorted", "asc");
      if (th.dataset.key === state.herbsSort.key) {
        th.classList.add("sorted");

  function fmt(n) {
    if (n == null || Number.isNaN(n) || !isFinite(n)) return "—";
    return Math.round(n).toLocaleString();
  }
  function fmtCompact(n) {
    if (n == null || Number.isNaN(n) || !isFinite(n)) return "—";
    const abs = Math.abs(n);
    if (abs >= 1e9) return (n/1e9).toFixed(2).replace(/\.?0+$/, "") + "B";
    if (abs >= 1e6) return (n/1e6).toFixed(2).replace(/\.?0+$/, "") + "M";
    if (abs >= 1e3) return (n/1e3).toFixed(1).replace(/\.?0+$/, "") + "k";
    return Math.round(n).toLocaleString();
  }
  function fmtSigned(n) {
    if (n == null) return "—";
    return (n > 0 ? "+" : "") + Math.round(n).toLocaleString();
  }
  function ageStr(sec) {
    if (sec == null) return "—";
    sec = Math.max(0, sec);
    if (sec < 60) return sec + "s";
    if (sec < 3600) return Math.floor(sec/60) + "m";
    if (sec < 86400) return Math.floor(sec/3600) + "h";
    return Math.floor(sec/86400) + "d";
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }
  function iconUrl(iconName) {
    if (!iconName) return "";
    return ICON_BASE + encodeURIComponent(iconName.replace(/ /g, "_"));

  function iconImg(iconName, size = 24) {

    return `<img src="${iconUrl(iconName)}" alt="" loading="lazy" onerror="this.style.display='none'" style="width:${size}px;height:${size}px">`;
  }

  // Jagex's official 180-day daily history (NOT wiki — completely independent source)
  // Used for long-term anchoring in the chart modal. Falls back to CORS proxy if direct fails.
  async function fetchJagex180Day(itemId) {
    const cached = state.jagexCache[itemId];
    if (cached && Date.now() - cached.ts < 24 * 60 * 60 * 1000) return cached.data;
    const url = JAGEX_GRAPH + itemId + ".json";
    try {
      let j;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("HTTP " + res.status);
        j = await res.json();
      } catch (corsErr) {
        // Fallback through CORS proxy
        const res = await fetch(CORS_PROXY + encodeURIComponent(url));
        if (!res.ok) throw new Error("Proxy HTTP " + res.status);
        j = await res.json();
      }
      // Jagex returns { daily: { "timestamp_ms": price, ... }, average: {...} }
      const series = [];
      if (j?.daily) {
        for (const [tsStr, price] of Object.entries(j.daily)) {
          series.push({ ts: Math.floor(+tsStr / 1000), price: +price });
        }
        series.sort((a, b) => a.ts - b.ts);
      }
      state.jagexCache[itemId] = { data: series, ts: Date.now() };
      return series;
    } catch (e) {
      state.jagexCache[itemId] = { data: [], ts: Date.now() };
      return [];
    }
  }

  // ===== OSRS NEWS FEED =====
  // Fetches Jagex's official OSRS news RSS and surfaces items mentioned in posts.
  // This is the "stuff people might miss" channel — quest hints, update notes, polls.
  const NEWS_RSS = "https://secure.runescape.com/m=news/latest_news.rss?oldschool=true";
  const NEWS_CACHE_MS = 60 * 60 * 1000; // 1 hour
  state.newsCache = null;
  state.newsCacheTs = 0;

  async function fetchNews() {
    if (state.newsCache && Date.now() - state.newsCacheTs < NEWS_CACHE_MS) return state.newsCache;
    let xmlText;
    try {
      const res = await fetch(NEWS_RSS);
      if (!res.ok) throw new Error("HTTP " + res.status);
      xmlText = await res.text();
    } catch (corsErr) {
      try {
        const res = await fetch(CORS_PROXY + encodeURIComponent(NEWS_RSS));
        if (!res.ok) throw new Error("Proxy HTTP " + res.status);
        xmlText = await res.text();
      } catch (e) {
        state.newsCache = [];
        state.newsCacheTs = Date.now();
        return [];
      }
    }
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, "text/xml");
    const items = [...doc.querySelectorAll("item")].slice(0, 8).map(node => ({
      title: node.querySelector("title")?.textContent?.trim() || "",
      link: node.querySelector("link")?.textContent?.trim() || "",
      date: node.querySelector("pubDate")?.textContent?.trim() || "",
      description: (node.querySelector("description")?.textContent || "").replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim(),
    }));
    state.newsCache = items;
    state.newsCacheTs = Date.now();
    return items;
  }

  // Find item-name mentions in a chunk of news text. Skips short/common names to avoid false matches.
  let _newsItemIndex = null;
  function getNewsItemIndex() {
    if (_newsItemIndex) return _newsItemIndex;
    _newsItemIndex = [];
    for (const item of Object.values(state.mapping || {})) {
      const name = item.name;
      // Skip names that are too short or generic to match cleanly in prose
      if (!name || name.length < 5) continue;
      // Skip pure numerics like "10,000 coins" placeholder items
      _newsItemIndex.push({ id: item.id, name, lower: name.toLowerCase(), members: item.members, icon: item.icon });
    }
    return _newsItemIndex;
  }
  function findItemsInText(text) {
    if (!text) return [];
    const lower = text.toLowerCase();
    const idx = getNewsItemIndex();
    const hits = [];
    const seen = new Set();
    for (const it of idx) {
      if (lower.includes(it.lower)) {
        if (!seen.has(it.id)) {
          hits.push(it);
          seen.add(it.id);
        }
        if (hits.length >= 12) break;
      }
    }
    return hits;
  }

  async function renderNews() {
    const list = $("#news-list");

      ).join("");
      return `

          <div class="news-date">${dateStr}</div>

  // ===== STATEFUL IN-MEMORY HISTORY (our edge — competitors are stateless) =====
  function recordHistoryTick() {
    const now = Date.now();
    for (const [idStr, p] of Object.entries(state.prices)) {
      if (p?.low == null && p?.high == null) continue;
      let arr = state.history[idStr];
      if (!arr) { arr = []; state.history[idStr] = arr; }
      const last = arr[arr.length - 1];
      // Skip if absolutely nothing changed (saves memory)
      if (last && last.low === p.low && last.high === p.high) continue;
      arr.push({ ts: now, low: p.low, high: p.high });
      if (arr.length > HISTORY_LIMIT) arr.shift();
    }
  }

  function computeVelocity(idStr) {
    const arr = state.history[idStr];
    if (!arr || arr.length < 2) return null;
    // Use most recent points to compute slope in gp/min
    const recent = arr.slice(-10); // up to last 10 ticks (~1 min)
    if (recent.length < 2) return null;
    const first = recent[0], last = recent[recent.length - 1];
    const dtMin = (last.ts - first.ts) / 60000;
    if (dtMin <= 0) return null;
    const lowDelta = last.low - first.low;
    const highDelta = last.high - first.high;
    const lowSlope = lowDelta / dtMin;
    const highSlope = highDelta / dtMin;
    // Relative move % for ranking
    const baseLow = first.low || 1;
    const baseHigh = first.high || 1;
    const lowPct = (lowDelta / baseLow) * 100;
    const highPct = (highDelta / baseHigh) * 100;
    return {
      lowSlope, highSlope,
      recentLowDelta: lowDelta, recentHighDelta: highDelta,
      lowPct, highPct,
      sampleSpanMin: dtMin,
    };
  }

  // ===== POTION FAMILY DETECTION =====
  function buildPotionFamilies() {
    const fam = {};
    for (const item of Object.values(state.mapping)) {
      const m = item.name.match(/^(.+) \((\d)\)$/);
      if (!m) continue;
      const base = m[1];
      const dose = +m[2];
      if (dose < 1 || dose > 4) continue;
      // Skip non-potion (1)/(2)/(3) items by checking item.name plausibility — most potions end in "potion (X)" or "(X)"
      // The pattern works for all potions; harmless to include the very rare false positives — they'll have no price/volume.
      if (!fam[base]) fam[base] = { name: base, doses: {} };
      fam[base].doses[dose] = item.id;
    }
    const result = {};
    for (const [base, f] of Object.entries(fam)) {
      if (Object.keys(f.doses).length >= 2) result[base] = f;
    }
    return result;
  }

  // ===== FLIPPING TAB COMPUTATIONS =====
  function computeRows() {
    const minVol = +$("#minVol").value || 0;
    const maxStale = (+$("#maxStale").value || 60) * 60;
    const membersMode = $("#members").value;
    const hideZero = $("#hideZero").checked;
    const hideSus = $("#hideSus").checked;
    const search = $("#search").value.trim().toLowerCase();
    const cfg = priceCfg();
    const strategy = $("#strategy")?.value || "reliable";

    const now = Math.floor(Date.now() / 1000);
    const rows = [];

    for (const [idStr, p] of Object.entries(state.prices)) {
      const id = +idStr;
      const meta = state.mapping[id];
      if (!meta) continue;
      const high = p.high, low = p.low;
      if (high == null || low == null) continue;

      const name = meta.name;
      if (search && !name.toLowerCase().includes(search)) continue;
      if (membersMode === "f2p" && meta.members) continue;
      if (membersMode === "p2p" && !meta.members) continue;

      const lowAge = p.lowTime ? now - p.lowTime : null;
      const highAge = p.highTime ? now - p.highTime : null;
      const newest = Math.min(lowAge ?? Infinity, highAge ?? Infinity);
      if (strategy !== "all" && newest > maxStale) continue;

      const vol = state.volumes[idStr] || { buy: 0, sell: 0 };
      const buyVol = vol.buy, sellVol = vol.sell;
      const throughput = Math.min(buyVol, sellVol);
      if (strategy !== "all" && throughput < minVol) continue;

      const margin = high - low;
      if (strategy !== "all" && hideZero && margin <= 0) continue;

      const buyAt = low + buyBumpFor(low, high, cfg);
      const sellAt = Math.max(buyAt, high - sellBumpFor(low, high, cfg));
      const tax = geTaxFor(id, sellAt);
      const convFee = conversionFee(id, buyAt);
      const net = sellAt - tax - buyAt - convFee;
      const roi = buyAt > 0 ? (net / buyAt) * 100 : 0;
      const limit = meta.limit || 0;

      const limitPerHour = limit > 0 ? limit / 4 : Infinity;
      const flipsPerHour = Math.min(throughput, limitPerHour);
      const expectedHourlyProfit = flipsPerHour * net;

      // Manipulation / staleness detection
      const d24 = state.prices24h[idStr];
      let suspect = false, suspectReason = "";
      if (d24) {
        const avgHigh = d24.avgHighPrice || 0;
        const avgLow = d24.avgLowPrice || 0;
        if (avgHigh > 100 && Math.abs(high - avgHigh) / avgHigh > 0.25 && throughput < 30) {
          suspect = true;
          suspectReason = "Spike vs 24h avg";
        }
        const avgSpread = avgHigh - avgLow;
        if (!suspect && avgSpread > 0 && margin > avgSpread * 3 && throughput < 30) {
          suspect = true;
          suspectReason = "Spread 3× 24h avg";
        }
      }
      if (!suspect && lowAge != null && highAge != null) {
        const olderSide = Math.max(lowAge, highAge);
        if (olderSide > 86400 && throughput < 5) {
          suspect = true;
          suspectReason = "One-sided market";
        }
      }
      if (strategy !== "all" && hideSus && suspect) continue;

      // ===== DROP-RISK: are we buying near the top of the 24h range? =====
      // Compares your Buy@ to the 24h average low. If you're paying meaningfully
      // above that average, you're buying at the high of the cycle → drop risk.
      let pctVsAvg = null, riskBand = null, riskLabel = "", buffer = null;
      const avgLow24 = d24?.avgLowPrice || 0;
      const avgHigh24 = d24?.avgHighPrice || 0;
      if (avgLow24 > 0) {
        pctVsAvg = (buyAt - avgLow24) / avgLow24 * 100;
        // "Buffer" = how much room before your Buy@ would be underwater vs a return to 24h avg
        buffer = avgHigh24 > 0 ? ((avgHigh24 - sellBumpFor(low, high, cfg) - geTaxFor(id, avgHigh24 - sellBumpFor(low, high, cfg)) - buyAt)) : null;
        if (pctVsAvg >= 7)       { riskBand = "high";     riskLabel = `+${pctVsAvg.toFixed(1)}% vs 24h`; }
        else if (pctVsAvg >= 3)  { riskBand = "elevated"; riskLabel = `+${pctVsAvg.toFixed(1)}% vs 24h`; }
        else if (pctVsAvg <= -5) { riskBand = "deal";     riskLabel = `${pctVsAvg.toFixed(1)}% vs 24h`; }
        else if (pctVsAvg <= -2) { riskBand = "discount"; riskLabel = `${pctVsAvg.toFixed(1)}% vs 24h`; }
        else                     { riskBand = "fair";     riskLabel = `${pctVsAvg >= 0 ? "+" : ""}${pctVsAvg.toFixed(1)}% vs 24h`; }
      }

      // Tier — drop risk can downgrade an otherwise-hot flip
      let tier = "normal", tierLabel = "";
      const dropRisky = riskBand === "high" && net < (buyAt * 0.05); // buying >7% above 24h avg AND not enough margin to absorb a snap-back
      if (suspect) {
        tier = "suspect"; tierLabel = "⚠ " + suspectReason;
      } else if (throughput < 2) {
        tier = "dead"; tierLabel = "💀 Dead";
      } else if (throughput < 10) {
        tier = "risky"; tierLabel = "⚠️ Low vol";
      } else if (dropRisky) {
        tier = "toppy"; tierLabel = "🌊 Buying high";
      } else if (net > 50000 && throughput < 60) {
        tier = "whale"; tierLabel = "💎 Big & slow";
      } else if (expectedHourlyProfit > 500000 && throughput > 200) {
        tier = "hot"; tierLabel = "🔥 Hot flip";
      } else if (expectedHourlyProfit > 50000 && throughput > 30) {
        tier = "solid"; tierLabel = "👍 Solid";
      }

      // ===== STABILITY SCORE (0–100, higher = more predictable) =====
      let stability = 100;
      if (pctVsAvg != null) {
        // Penalize for current price deviating from 24h avg (~6 pts per 1% off)
        stability -= Math.min(60, Math.abs(pctVsAvg) * 6);
      } else {
        // No 24h data → can't really judge, dock some confidence
        stability -= 25;
      }
      if (avgLow24 > 0 && avgHigh24 > 0) {
        const sprdNow = high - low;
        const sprdAvg = avgHigh24 - avgLow24;
        if (sprdAvg > 0) {
          // Penalize if today's spread differs a lot from typical (current spread suddenly 2× normal = unstable)
          const ratio = sprdNow / sprdAvg;
          stability -= Math.min(30, Math.abs(ratio - 1) * 25);
        }
      }
      if (throughput > 200) stability += 8;
      else if (throughput < 15) stability -= 20;
      else if (throughput < 40) stability -= 8;
      if (suspect) stability -= 40;
      // Items with positive net well above zero (margin can absorb wobble) get a small boost
      if (net > 0 && buyAt > 0 && (net / buyAt) > 0.03) stability += 5;
      stability = Math.max(0, Math.min(100, Math.round(stability)));

      // ===== MOMENTUM + BREWING SCORE (early-deal detection) =====
      // Momentum = how 1h average price differs from 24h average. Positive = trending up.
      const d1h = state.prices1h[idStr];
      let momentum1h = null;
      if (d1h?.avgHighPrice && avgHigh24 > 0) {
        momentum1h = (d1h.avgHighPrice - avgHigh24) / avgHigh24 * 100;
      }
      // Volume imbalance: are buyers stepping in faster than sellers?
      const buyPressure = (sellVol > 0 && buyVol > 0) ? (sellVol / (buyVol + sellVol)) : 0.5;

      // ===== VOLUME SURGE (leading indicator: market activity heating up) =====
      // Compare last-hour total volume to the hourly average over the last 24h.
      // Surge >> 1 means activity is unusually elevated → often precedes a price move.
      const total1hVol = buyVol + sellVol;
      const total24hVol = (d24?.lowPriceVolume || 0) + (d24?.highPriceVolume || 0);
      const expectedPerHour = total24hVol / 24;
      const volumeSurge = expectedPerHour >= 3
        ? (total1hVol / expectedPerHour)
        : 1; // not enough baseline to judge

      let surgeLabel = "", surgeBand = null;
      if (volumeSurge >= 4)      { surgeBand = "mega"; surgeLabel = `🚀 ${volumeSurge.toFixed(1)}× vol`; }
      else if (volumeSurge >= 2) { surgeBand = "high"; surgeLabel = `🔥 ${volumeSurge.toFixed(1)}× vol`; }
      else if (volumeSurge >= 1.5){ surgeBand = "mid";  surgeLabel = `💨 ${volumeSurge.toFixed(1)}× vol`; }

      // ===== VELOCITY (live in-memory tick deltas — our edge) =====
      const vel = computeVelocity(idStr);
      let velLabel = "", velBand = null;
      if (vel && Math.abs(vel.sampleSpanMin) > 0.1) {
        // Use the high-side slope (the price you'd sell at) as primary direction signal
        const slope = vel.highSlope;
        const slopePct = vel.highPct;
        if (slopePct >= 0.8)      { velBand = "up-fast"; velLabel = `⚡ +${vel.highSlope.toFixed(0)}/min`; }
        else if (slopePct >= 0.15){ velBand = "up";      velLabel = `↑ +${vel.highSlope.toFixed(0)}/min`; }
        else if (slopePct <= -0.8){ velBand = "dn-fast"; velLabel = `⚡ ${vel.highSlope.toFixed(0)}/min`; }
        else if (slopePct <= -0.15){velBand = "dn";      velLabel = `↓ ${vel.highSlope.toFixed(0)}/min`; }
      }

      // ===== MULTI-TIMEFRAME CONFIRMATION =====
      // Strongest signal: 5m + 1h + 24h all agree on direction
      const d5m = state.prices5m[idStr];
      let trend5m = null;
      if (d5m?.avgHighPrice && d1h?.avgHighPrice) {
        trend5m = (d5m.avgHighPrice - d1h.avgHighPrice) / d1h.avgHighPrice * 100;
      }
      const liveDir = vel ? Math.sign(vel.highPct) : 0;
      const dir5m = trend5m != null ? Math.sign(trend5m) : 0;
      const dir1h = momentum1h != null ? Math.sign(momentum1h) : 0;
      const dir24 = pctVsAvg != null ? Math.sign(-pctVsAvg) : 0; // below 24h avg = mean reversion upward bias
      // Count agreeing signals
      const dirs = [liveDir, dir5m, dir1h, dir24];
      const upVotes = dirs.filter(d => d > 0).length;
      const dnVotes = dirs.filter(d => d < 0).length;
      let mtfLabel = "", mtfBoost = 0;
      if (upVotes >= 3 && dnVotes === 0) { mtfLabel = "🔗 multi-TF up"; mtfBoost = 15; }
      else if (dnVotes >= 3 && upVotes === 0) { mtfLabel = "🔗 multi-TF dn"; mtfBoost = -15; }

      // ===== POSITION TRADE SCORE (long-hold candidates) =====
      // The thesis: item is cheap by recent standards AND showing early signs of a turn,
      // AND has enough margin/size to be worth holding for hours/days, not minutes.
      // If Jagex 180-day data is cached (from a prior chart view), we boost with multi-month context.
      let positionScore = 0;
      // Discount component — cheaper than 24h average = setup
      if (pctVsAvg != null) {
        if (pctVsAvg <= -5) positionScore += 35;
        else if (pctVsAvg <= -2) positionScore += 22;
        else if (pctVsAvg <= 1) positionScore += 10;
        else positionScore -= 5;
      }
      // Turn signal — momentum just turning up after the discount
      if (momentum1h != null && momentum1h >= 0.3 && momentum1h <= 3) positionScore += 25;
      else if (momentum1h != null && momentum1h > 3) positionScore += 10;
      else if (momentum1h != null && momentum1h < -1) positionScore -= 15;
      // Size — only worth position-trading items with real money in them
      if (buyAt >= 1_000_000) positionScore += 15;
      else if (buyAt >= 100_000) positionScore += 10;
      else if (buyAt < 10_000) positionScore -= 10;
      // Margin — meaningful per-item profit to justify the wait
      if (net >= 100_000) positionScore += 15;
      else if (net >= 20_000) positionScore += 10;
      else if (net >= 5_000) positionScore += 5;
      // Predictability bonus
      if (stability >= 65) positionScore += 10;
      // Some liquidity required (but lower bar than other strategies — slow OK)
      if (throughput < 3) positionScore -= 25;
      // 180-day Jagex context (only available if user has viewed this item's chart)
      const jagexData = state.jagexCache[id]?.data;
      if (jagexData && jagexData.length > 30) {
        const cutoff90 = Math.floor(Date.now() / 1000) - 90 * 86400;
        const last90 = jagexData.filter(d => d.ts >= cutoff90);
        if (last90.length) {
          const avg90 = last90.reduce((s, d) => s + d.price, 0) / last90.length;
          const min90 = Math.min(...last90.map(d => d.price));
          // Big boost if current is at or near 90-day low (true multi-month discount)
          if (low <= min90 * 1.05) positionScore += 25;
          if (low < avg90 * 0.9) positionScore += 15;
        }
      }
      if (suspect) positionScore = Math.max(0, positionScore - 40);
      positionScore = Math.max(0, Math.min(100, positionScore));

      // Big Mover score: surge + early-entry position + momentum confirmation + live velocity
      let bigMoverScore = 0;
      if (volumeSurge >= 3) bigMoverScore += 40;
      else if (volumeSurge >= 2) bigMoverScore += 30;
      else if (volumeSurge >= 1.5) bigMoverScore += 18;
      if (momentum1h != null && momentum1h >= 1) bigMoverScore += 25;
      else if (momentum1h != null && momentum1h >= 0.3) bigMoverScore += 12;
      else if (momentum1h != null && momentum1h <= -1.5) bigMoverScore -= 25;
      // Entry window: price hasn't fully reacted yet
      if (pctVsAvg != null && Math.abs(pctVsAvg) <= 3) bigMoverScore += 20;
      else if (pctVsAvg != null && pctVsAvg > 8) bigMoverScore -= 15;
      if (throughput > 100) bigMoverScore += 10;
      // Live velocity adds real-time confirmation that NO competitor tool has
      if (vel && vel.highPct >= 0.5) bigMoverScore += 15;
      else if (vel && vel.highPct <= -0.5) bigMoverScore -= 10;
      bigMoverScore += mtfBoost;
      if (suspect) bigMoverScore = Math.max(0, bigMoverScore - 40);
      bigMoverScore = Math.max(0, Math.min(100, bigMoverScore));

      // Brewing score: 0–100, "this looks like it's becoming a deal"
      let brewingScore = 0;
      if (pctVsAvg != null && pctVsAvg <= 2) brewingScore += 30;      // not already pumped
      if (pctVsAvg != null && pctVsAvg <= -2) brewingScore += 10;     // bonus if outright cheap
      if (momentum1h != null && momentum1h >= 0.5) brewingScore += 30; // 1h trend up
      if (buyPressure > 0.6) brewingScore += 20;                       // buyers pushing
      if (throughput > 50) brewingScore += 10;                         // healthy active market
      if (net > 0) brewingScore += 10;                                 // already profitable to flip too
      if (suspect) brewingScore = Math.max(0, brewingScore - 40);

      // Outlook chip (visible across all strategies)
      let outlook = null, outlookLabel = "";
      if (brewingScore >= 60 && momentum1h != null && momentum1h > 0) {
        outlook = "brewing"; outlookLabel = `🔮 Brewing +${momentum1h.toFixed(1)}%/h`;
      } else if (momentum1h != null) {
        if (momentum1h >= 2)        { outlook = "rising";  outlookLabel = `📈 +${momentum1h.toFixed(1)}%/h`; }
        else if (momentum1h >= 0.5) { outlook = "warming"; outlookLabel = `🌱 +${momentum1h.toFixed(1)}%/h`; }
        else if (momentum1h <= -2)  { outlook = "falling"; outlookLabel = `📉 ${momentum1h.toFixed(1)}%/h`; }
        else if (momentum1h <= -0.5){ outlook = "cooling"; outlookLabel = `❄ ${momentum1h.toFixed(1)}%/h`; }
      }

      // Strategy filter: apply per-mode hard filters
      if (strategy === "reliable" && stability < 55) continue;
      if (strategy === "discount" && (pctVsAvg == null || pctVsAvg > 0)) continue;
      if (strategy === "brewing"  && brewingScore < 50) continue;
      if (strategy === "bigmover" && bigMoverScore < 50) continue;
      if (strategy === "position" && positionScore < 55) continue;

      // Composite ranking score for "reliable" mode = stability-weighted gp/hr
      const reliableScore = expectedHourlyProfit * (stability / 100);

      rows.push({
        id, name, members: !!meta.members, icon: meta.icon,
        low, high, buyAt, sellAt, margin, net, roi,
        limit, buyVol, sellVol, throughput,
        expectedHourlyProfit, reliableScore,
        tier, tierLabel, suspect, stability,
        pctVsAvg, riskBand, riskLabel, buffer,
        avgLow24, avgHigh24,
        momentum1h, brewingScore, outlook, outlookLabel,
        volumeSurge, surgeBand, surgeLabel, bigMoverScore,
        velLabel, velBand, mtfLabel,
        velHighSlope: vel?.highSlope ?? 0,
        positionScore,
        lowAge, highAge,
        lowAgeSort: lowAge ?? 1e12,
        highAgeSort: highAge ?? 1e12,
      });
    }

    // If user hasn't manually overridden the sort, use the strategy-appropriate default
    let effectiveKey = state.sortKey, effectiveDir = state.sortDir;
    if (state.sortFollowsStrategy !== false) {
      if (strategy === "reliable") { effectiveKey = "reliableScore"; effectiveDir = "desc"; }
      else if (strategy === "discount") { effectiveKey = "pctVsAvg"; effectiveDir = "asc"; }
      else if (strategy === "brewing")  { effectiveKey = "brewingScore"; effectiveDir = "desc"; }
      else if (strategy === "bigmover") { effectiveKey = "bigMoverScore"; effectiveDir = "desc"; }
      else if (strategy === "position") { effectiveKey = "positionScore"; effectiveDir = "desc"; }
      else if (strategy === "all") { effectiveKey = "name"; effectiveDir = "asc"; }
      else { effectiveKey = "expectedHourlyProfit"; effectiveDir = "desc"; }
    }
    rows.sort((a, b) => {
      let av = a[effectiveKey], bv = b[effectiveKey];
      if (typeof av === "string") { av = av.toLowerCase(); bv = bv.toLowerCase(); }
      if (av == null) av = -Infinity;
      if (bv == null) bv = -Infinity;
      if (av < bv) return effectiveDir === "asc" ? -1 : 1;
      if (av > bv) return effectiveDir === "asc" ? 1 : -1;
      return 0;
    });
    state._currentSortKey = effectiveKey;
    state._currentSortDir = effectiveDir;
    return rows;
  }

  // ===== CASH-AWARE SLOT ALLOCATOR =====
  // GE buy limits are per 4 hours, so the slot plan reflects ONE FULL 4-HOUR CYCLE:
  //   qty per slot = min(GE buy limit, sell volume × 4h, cash / buyAt)
  //   cost = qty × buyAt  (capital tied up for that cycle)
  //   profit per cycle = qty × net
  //   profit per hour = profit per cycle / 4
  function computeSlotPlan(allRows) {
    const cash = parseCash($("#cash").value);
    const slots = Math.max(1, Math.min(8, +$("#slots").value || 8));

    if (cash <= 0) {
      $("#cash-section").hidden = true;
      return;
    }
    $("#cash-section").hidden = false;
    $("#bankDisplay").textContent = fmtCompact(cash) + " gp";

    // Filter to genuinely tradeable, non-suspect items with a known GE limit
    const eligible = allRows.filter(r =>
      !r.suspect && r.tier !== "dead" && r.tier !== "risky" &&
      r.net > 0 && r.throughput > 5 && r.buyAt > 0 && r.limit > 0
    );
    // Rank by gp/hr
    eligible.sort((a,b) => b.expectedHourlyProfit - a.expectedHourlyProfit);

    const plan = [];
    let remaining = cash;
    const usedIds = new Set();
    for (const r of eligible) {
      if (plan.length >= slots) break;
      if (usedIds.has(r.id)) continue;

      // Full 4-hour cycle: bounded by GE buy limit and what the market can actually move in 4h
      const limit4h = r.limit;
      const throughput4h = Math.floor(r.throughput * 4);
      const idealQty = Math.max(1, Math.min(limit4h, throughput4h));
      const idealCost = idealQty * r.buyAt;

      let qty, cost, cashBound = false;
      if (idealCost <= remaining) {
        qty = idealQty;
        cost = idealCost;
      } else {
        qty = Math.floor(remaining / r.buyAt);
        if (qty < 1) continue;
        cost = qty * r.buyAt;
        cashBound = true;
      }
      const profitPerCycle = qty * r.net;
      const profitPerHour = profitPerCycle / 4;
      plan.push({ ...r, qty, limit4h, cost, profitPerCycle, profitPerHour, cashBound });
      remaining -= cost;
      usedIds.add(r.id);
      if (remaining < 1000) break;
    }

    const totalDeployed = plan.reduce((s, p) => s + p.cost, 0);
    const totalGpHr   = plan.reduce((s, p) => s + p.profitPerHour, 0);
    const totalGp4h   = plan.reduce((s, p) => s + p.profitPerCycle, 0);
    $("#planDeployed").textContent = fmtCompact(totalDeployed) + " gp";
    $("#planGpHr").textContent = "+" + fmtCompact(totalGpHr) + " gp/hr (+" + fmtCompact(totalGp4h) + "/4h)";
    $("#planSlots").textContent = plan.length + "/" + slots;

    const cards = [];
    for (let i = 0; i < slots; i++) {
      const p = plan[i];
      if (p) {
        const limitNote = p.cashBound
          ? `<span class="sub cap">cash-bound · ${fmt(p.qty)} of ${fmt(p.limit4h)} limit</span>`
          : `<span class="sub">${fmt(p.qty)} / ${fmt(p.limit4h)} per 4h limit</span>`;
        cards.push(`
          <div class="slot-card" data-id="${p.id}">
            <div class="num">${i+1}</div>
            <div class="icon-wrap">${iconImg(p.icon, 24)}</div>
            <div class="info">
              <div class="name">${escapeHtml(p.name)}</div>
              <div class="sub">${fmt(p.qty)}× @ ${fmtCompact(p.buyAt)} = ${fmtCompact(p.cost)} cash</div>
              <div class="sub green">+${fmtCompact(p.profitPerCycle)}/cycle · +${fmtCompact(p.profitPerHour)}/hr</div>
              <div>${limitNote}</div>
            </div>
          </div>`);
      } else {
        cards.push(`<div class="slot-card empty"><div class="num">${i+1}</div><div class="info"><div class="sub">Empty slot</div></div></div>`);
      }
    }
    $("#slot-grid").innerHTML = cards.join("");
  }
