  // ===== ALCHING TAB =====
  function computeAlchRows() {
    const natP = state.prices[NATURE_RUNE_ID];
    const natRunePrice = natP ? (natP.high || natP.low || 100) : 100;
    const search = $("#alch-search").value.trim().toLowerCase();
    const minProfit = +$("#alch-minProfit").value || 0;
    const membersMode = $("#alch-members").value;
    const cash = parseCash($("#alch-cash").value);
    const cfg = priceCfg();

    const rows = [];
    for (const item of Object.values(state.mapping)) {
      if (!item.highalch || item.highalch <= 0) continue;
      const p = state.prices[item.id];
      if (!p || p.low == null) continue;
      if (membersMode === "f2p" && item.members) continue;
      if (membersMode === "p2p" && !item.members) continue;
      if (search && !item.name.toLowerCase().includes(search)) continue;

      const buyAt = p.low + buyBumpFor(p.low, p.high ?? p.low, cfg);
      const profit = item.highalch - buyAt - natRunePrice;
      if (profit < minProfit) continue;
      if (profit <= 0) continue;

      const vol = state.volumes[item.id] || { buy: 0, sell: 0 };
      const limit = item.limit || 0;
      // Casts/hr realistic: capped by ALCH_CASTS_PER_HR, buy volume, and limit/4
      const buyCap = vol.buy || Infinity;
      const limitCap = limit > 0 ? limit / 4 : Infinity;
      const castsPerHour = Math.min(ALCH_CASTS_PER_HR, buyCap, limitCap);
      const gpHr = castsPerHour * profit;
      const affordable = cash <= 0 || (buyAt * Math.min(castsPerHour, limit || Infinity)) <= cash;
      if (!affordable) continue;

      rows.push({
        id: item.id, name: item.name, icon: item.icon, members: item.members,
        buyAt, highalch: item.highalch, natRunePrice, profit,
        buyVol: vol.buy, limit, gpHr,
      });
    }
    const { key, dir } = state.alchSort;
    rows.sort((a,b) => {
      let av = a[key], bv = b[key];
      if (typeof av === "string") { av = av.toLowerCase(); bv = bv.toLowerCase(); }
      if (av == null) av = -Infinity; if (bv == null) bv = -Infinity;
      if (av < bv) return dir === "asc" ? -1 : 1;
      if (av > bv) return dir === "asc" ? 1 : -1;
      return 0;
    });
    return rows;
  }

  // ===== SETS TAB =====
  function computeSetsRows() {
    const minProfit = +$("#sets-minProfit").value || 0;
    const rows = [];
    for (const [setIdStr, setData] of Object.entries(ARMOR_SETS)) {
      const setId = +setIdStr;
      const setItem = state.mapping[setId];
      const setPrice = state.prices[setId];
      if (!setItem || !setPrice || setPrice.low == null || setPrice.high == null) continue;

      const cfg = priceCfg();
      let combineCost = 0, decombineSellGross = 0, decombineSellTax = 0, available = true;
      for (const partId of setData.parts) {
        const pp = state.prices[partId];
        if (!pp || pp.low == null || pp.high == null) { available = false; break; }
        combineCost += pp.low + buyBumpFor(pp.low, pp.high, cfg);
        const partSellAt = pp.high - sellBumpFor(pp.low, pp.high, cfg);
        decombineSellGross += partSellAt;
        decombineSellTax += geTaxFor(partId, partSellAt);
      }
      if (!available) continue;

      const setSellAt = setPrice.high - sellBumpFor(setPrice.low, setPrice.high, cfg);
      const setBuyAt = setPrice.low + buyBumpFor(setPrice.low, setPrice.high, cfg);

      const combineProfit = setSellAt - geTaxFor(setId, setSellAt) - combineCost;
      const decombineProfit = decombineSellGross - decombineSellTax - setBuyAt;
      const bestProfit = Math.max(combineProfit, decombineProfit);
      if (bestProfit < minProfit) continue;
      const bestAction = combineProfit >= decombineProfit ? "Combine parts → sell set" : "Buy set → sell parts";

      rows.push({
        setId, name: setData.name, icon: setItem.icon, members: setItem.members,
        combineCost, combineSell: setSellAt, combineProfit,
        decombineCost: setBuyAt, decombineSell: decombineSellGross, decombineProfit,
        bestProfit, bestAction,
      });
    }
    const { key, dir } = state.setsSort;
    rows.sort((a,b) => {
      let av = a[key], bv = b[key];
      if (typeof av === "string") { av = av.toLowerCase(); bv = bv.toLowerCase(); }
      if (av < bv) return dir === "asc" ? -1 : 1;
      if (av > bv) return dir === "asc" ? 1 : -1;
      return 0;
    });
    return rows;
  }
  function renderSetsTab() {
    const rows = computeSetsRows();
    const html = rows.map(r => `
      <tr data-id="${r.setId}">
        <td class="left">
          <div class="item-cell">
            <div class="icon-wrap">${iconImg(r.icon, 24)}</div>
            <div><span class="item-name">${escapeHtml(r.name)}</span><span class="badge ${r.members ? 'p' : 'f'}">${r.members ? 'P' : 'F'}</span></div>
          </div>
        </td>
        <td class="dim">${fmt(r.combineCost)}</td>
        <td class="dim">${fmt(r.combineSell)}</td>
        <td class="${r.combineProfit > 0 ? 'pos' : 'neg'}">${fmtSigned(r.combineProfit)}</td>
        <td class="dim">${fmt(r.decombineCost)}</td>
        <td class="dim">${fmt(r.decombineSell)}</td>
        <td class="${r.decombineProfit > 0 ? 'pos' : 'neg'}">${fmtSigned(r.decombineProfit)}</td>
        <td class="${r.bestProfit > 0 ? 'pos' : 'neg'}"><strong>${fmtSigned(r.bestProfit)}</strong></td>
        <td class="left">${r.bestProfit > 0 ? escapeHtml(r.bestAction) : '<span class="dim">No edge</span>'}</td>
      </tr>`).join("");
    $("#sets-rows").innerHTML = html || '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px">No set arbitrage right now.</td></tr>';

    document.querySelectorAll("#sets-tbl thead th").forEach(th => {
      th.classList.remove("sorted", "asc");
      if (th.dataset.key === state.setsSort.key) {
        th.classList.add("sorted");
        if (state.setsSort.dir === "asc") th.classList.add("asc");
      }
    });
  }

  // ===== DECANTING TAB =====
  function computeDecantRows() {
    if (!state.potionFamilies) state.potionFamilies = buildPotionFamilies();
    const search = $("#decant-search").value.trim().toLowerCase();
    const minProfit = +$("#decant-minProfit").value || 0;
    const minVol = +$("#decant-minVol").value || 0;

    // All decant pairs: from-dose → to-dose, find LCM combo that uses whole units.
    // Buy qIn × fromDose-pot, convert to qOut × toDose-pot. qIn × fromDose == qOut × toDose.
    const pairs = [
      { from: 4, to: 3, qIn: 3, qOut: 4 },
      { from: 4, to: 2, qIn: 1, qOut: 2 },
      { from: 4, to: 1, qIn: 1, qOut: 4 },
      { from: 3, to: 2, qIn: 2, qOut: 3 },
      { from: 3, to: 1, qIn: 1, qOut: 3 },
      { from: 2, to: 1, qIn: 1, qOut: 2 },
    ];

    const cfg = priceCfg();
    const rows = [];
    for (const family of Object.values(state.potionFamilies)) {
      if (search && !family.name.toLowerCase().includes(search)) continue;

      // Find the best decant variant for this family
      let best = null;
      for (const pair of pairs) {
        const fromId = family.doses[pair.from], toId = family.doses[pair.to];
        if (!fromId || !toId) continue;
        const pFrom = state.prices[fromId], pTo = state.prices[toId];
        if (!pFrom || !pTo || pFrom.low == null || pTo.high == null) continue;

        const buyFrom = pFrom.low + buyBumpFor(pFrom.low, pFrom.high ?? pFrom.low, cfg);
        const sellTo = pTo.high - sellBumpFor(pTo.low ?? pTo.high, pTo.high, cfg);
        const cost = pair.qIn * buyFrom;
        const proceedsNet = pair.qOut * (sellTo - geTaxFor(toId, sellTo));
        const profit = proceedsNet - cost;
        const profitPerFromUnit = profit / pair.qIn;

        const vTo = state.volumes[toId] || { buy: 0, sell: 0 };
        const vFrom = state.volumes[fromId] || { buy: 0, sell: 0 };

        const candidate = {
          fromDose: pair.from, toDose: pair.to,
          fromId, toId,
          buyFrom, sellTo,
          qIn: pair.qIn, qOut: pair.qOut,
          costPer: cost, proceedsPer: proceedsNet,
          profitPerCycle: profit,
          profitPerFromUnit,
          volBuy: vFrom.buy, volSell: vTo.sell,
        };
        if (!best || candidate.profitPerCycle > best.profitPerCycle) {
          best = candidate;
        }
      }
      if (!best) continue;
      if (best.profitPerCycle < minProfit) continue;
      if (best.volSell < minVol) continue;

      rows.push({
        d4Id: best.fromId, d3Id: best.toId,
        name: family.name,
        icon: state.mapping[best.fromId]?.icon,
        members: state.mapping[best.fromId]?.members,
        buy4: best.buyFrom, sell3: best.sellTo,
        costPer: best.costPer, proceedsPer: best.proceedsPer,
        profitPerCycle: best.profitPerCycle,
        profitPer4: best.profitPerFromUnit,
        volBuy: best.volBuy, volSell: best.volSell,
        fromDose: best.fromDose, toDose: best.toDose,
        qIn: best.qIn, qOut: best.qOut,
      });
    }
    const { key, dir } = state.decantSort;
    rows.sort((a,b) => {
      let av = a[key], bv = b[key];
      if (typeof av === "string") { av = av.toLowerCase(); bv = bv.toLowerCase(); }
      if (av < bv) return dir === "asc" ? -1 : 1;
      if (av > bv) return dir === "asc" ? 1 : -1;
      return 0;
    });
    return rows;
  }
  function renderDecantTab() {
    const rows = computeDecantRows();
    const html = rows.map(r => `
      <tr data-id="${r.d4Id}">
        <td class="left">
          <div class="item-cell">
            <div class="icon-wrap">${iconImg(r.icon, 24)}</div>
            <div>
              <span class="item-name">${escapeHtml(r.name)}</span><span class="badge ${r.members ? 'p' : 'f'}">${r.members ? 'P' : 'F'}</span>
              <span class="decant-arrow">${r.fromDose}→${r.toDose}</span>
            </div>
          </div>
        </td>
        <td>${pricePill("buy", r.buy4)}</td>
        <td>${pricePill("sell", r.sell3)}</td>
        <td class="dim">${fmt(r.costPer)} <span style="color:var(--dim)">(${r.qIn}×)</span></td>
        <td class="dim">${fmt(r.proceedsPer)} <span style="color:var(--dim)">(${r.qOut}×)</span></td>
        <td class="${r.profitPerCycle > 0 ? 'pos' : 'neg'}"><strong>${fmtSigned(r.profitPerCycle)}</strong></td>
        <td class="${r.profitPer4 > 0 ? 'pos' : 'neg'}">${fmtSigned(r.profitPer4)}</td>
        <td>${fmt(r.volBuy)}</td>
        <td>${fmt(r.volSell)}</td>
      </tr>`).join("");
    $("#decant-rows").innerHTML = html || '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:30px">No profitable decants right now.</td></tr>';

    document.querySelectorAll("#decant-tbl thead th").forEach(th => {
      th.classList.remove("sorted", "asc");
      if (th.dataset.key === state.decantSort.key) {
        th.classList.add("sorted");
        if (state.decantSort.dir === "asc") th.classList.add("asc");
      }
    });
  }

  // ===== LIVE GE WATCHER =====
  const watcher = {
    stream: null,
    video: null,
    region: null,           // {x, y, w, h} normalized to video dimensions (0..1)
    slotCount: 8,
    slots: [],              // [{ region:{x,y,w,h}, itemName:str, prev:ImageData, lastChange:ts, canvas, ctx }]
    captureCanvas: null,
    captureCtx: null,
    thumbCanvas: null,
    thumbCtx: null,
    prevFrameData: null,    // full-region diff (kept for the "any change" ping)
    intervalId: null,
    lastChangeTs: null,
    captureMs: 2000,
  };
  const LS_REGION = "osrs-flipper-watcher-region-v1";
  const LS_SLOTS = "osrs-flipper-watcher-slots-v1";
  const LS_SLOT_COUNT = "osrs-flipper-watcher-slot-count-v1";

  function loadWatcherRegion() {
    try { watcher.region = JSON.parse(localStorage.getItem(LS_REGION)) || null; } catch (e) { watcher.region = null; }
    try {
      const sc = +localStorage.getItem(LS_SLOT_COUNT);
      if (sc === 3 || sc === 8) watcher.slotCount = sc;
    } catch (e) {}
    try {
      const labels = JSON.parse(localStorage.getItem(LS_SLOTS)) || [];
      watcher.slotLabels = Array.isArray(labels) ? labels : [];
    } catch (e) { watcher.slotLabels = []; }
  }
  function saveWatcherRegion() {
    try { localStorage.setItem(LS_REGION, JSON.stringify(watcher.region)); } catch (e) {}
  }
  function saveSlotLabels() {
    const labels = watcher.slots.map(s => s.itemName || "");
    try { localStorage.setItem(LS_SLOTS, JSON.stringify(labels)); } catch (e) {}
  }
  function saveSlotCount() {
    try { localStorage.setItem(LS_SLOT_COUNT, String(watcher.slotCount)); } catch (e) {}
  }

  function subdivideRegion(count) {
    // Splits the main crop region into N sub-regions (normalized 0..1, relative to the main region).
    // 8 slots → 4 rows × 2 cols. 3 slots → 3 rows × 1 col (matches F2P layout).
    const subs = [];
    if (count === 3) {
      for (let i = 0; i < 3; i++) subs.push({ x: 0, y: i / 3, w: 1, h: 1 / 3 });
    } else {
      for (let i = 0; i < 8; i++) subs.push({ x: (i % 2) / 2, y: Math.floor(i / 2) / 4, w: 0.5, h: 0.25 });
    }
    return subs;
  }

  function buildSlots() {
    const subs = subdivideRegion(watcher.slotCount);
    const oldLabels = watcher.slotLabels || [];
    watcher.slots = subs.map((sub, i) => ({
      region: sub,
      itemName: oldLabels[i] || "",
      prev: null,
      lastChange: null,
      canvas: null,
      ctx: null,
    }));
  }

  function renderSlotGrid() {
    const grid = $("#slot-watch-grid");
    if (!grid) return;
    grid.innerHTML = watcher.slots.map((s, i) => `
      <div class="slot-watch-card" data-slot="${i}">
        <div class="slot-head"><span class="slot-num">Slot ${i + 1}</span><span id="slot-time-${i}">—</span></div>
        <canvas id="slot-canvas-${i}" width="160" height="60"></canvas>
        <input type="text" class="slot-label" data-slot-label="${i}" placeholder="Item in this slot…" value="${escapeHtml(s.itemName || "")}" list="slot-items-list" />
        <div class="slot-actions">
          <button class="btn-buy" data-slot-buy="${i}" title="Log a buy that just filled in this slot">📥 Buy</button>
          <button class="btn-sell" data-slot-sell="${i}" title="Log a sell that just filled in this slot">💰 Sell</button>
        </div>
      </div>`).join("");

    // Cache canvas references
    for (let i = 0; i < watcher.slots.length; i++) {
      const c = document.getElementById(`slot-canvas-${i}`);
      watcher.slots[i].canvas = c;
      watcher.slots[i].ctx = c.getContext("2d");
    }

    // Ensure datalist of items exists for slot label autocomplete
    if (!document.getElementById("slot-items-list")) {
      const dl = document.createElement("datalist");
      dl.id = "slot-items-list";
      const names = Object.values(state.mapping).slice(0, 4000).map(it => `<option value="${escapeHtml(it.name)}">`).join("");
      dl.innerHTML = names;
      document.body.appendChild(dl);
    }
  }

  function findItemIdByName(name) {
    if (!name) return null;
    const lower = name.trim().toLowerCase();
    for (const item of Object.values(state.mapping)) {
      if (item.name.toLowerCase() === lower) return item.id;
    }
    return null;
  }

  function slotAction(slotIdx, side) {
    // side = "buy" or "sell"
    const slot = watcher.slots[slotIdx];
    if (!slot) return;
    const name = slot.itemName?.trim();
    if (!name) {
      alert(`Slot ${slotIdx + 1}: enter an item name in this slot's label first.`);
      return;
    }
    const id = findItemIdByName(name);
    if (!id) {
      alert(`Couldn't find an item called "${name}" in the live catalog. Check the spelling — typing the first few letters usually shows suggestions.`);
      return;
    }
    const p = state.prices[id];
    const meta = state.mapping[id];
    if (!p || !meta) {
      alert(`No live price data for ${name} yet.`);
      return;
    }
    const cfg = priceCfg();
    const buyAt = p.low + buyBumpFor(p.low, p.high, cfg);
    const sellAt = Math.max(buyAt, p.high - sellBumpFor(p.low, p.high, cfg));
    const limitPerHour = meta.limit > 0 ? meta.limit : 1;

    if (side === "buy") {
      // Create or update a position based on the slot
      const existing = state.positions[id];
      const defaultQty = existing?.qty || Math.min(meta.limit || 100, 100);
      const qtyStr = prompt(`Slot ${slotIdx + 1}: Bought ${name} — qty?`, String(defaultQty));
      if (qtyStr == null) return;
      const qty = Math.max(1, Math.round(+qtyStr || 0));
      const priceStr = prompt(`Slot ${slotIdx + 1}: At what price per item?`, String(buyAt));
      if (priceStr == null) return;
      const price = Math.max(1, Math.round(+priceStr || 0));
      state.watch.add(id);
      state.positions[id] = { buyPrice: price, qty, boughtAt: Date.now() };
      saveSettings();
      renderWatchlist();
      $("#watcher-meta-last").textContent = new Date().toLocaleTimeString();
    } else if (side === "sell") {
      // If there's an existing position for this item, this sell closes/reduces it.
      const existing = state.positions[id];
      if (existing) {
        const defaultQty = existing.qty;
        const qtyStr = prompt(`Slot ${slotIdx + 1}: Sold ${name} — qty? (you held ${defaultQty})`, String(defaultQty));
        if (qtyStr == null) return;
        const qty = Math.max(1, Math.min(existing.qty, Math.round(+qtyStr || 0)));
        const priceStr = prompt(`Slot ${slotIdx + 1}: At what sell price per item?`, String(sellAt));
        if (priceStr == null) return;
        const price = Math.max(1, Math.round(+priceStr || 0));
        // Compute P&L for the closed portion
        const tax = geTaxFor(id, price);
        const convFee = conversionFee(id, existing.buyPrice);
        const realizedPerItem = price - tax - existing.buyPrice - convFee;
        const realizedTotal = realizedPerItem * qty;
        // Reduce position
        if (qty >= existing.qty) {
          delete state.positions[id];
        } else {
          existing.qty -= qty;
        }
        saveSettings();
        renderWatchlist();
        alert(`Sold ${qty}× ${name} @ ${fmt(price)} → realized ${fmtSigned(realizedTotal)} gp (${fmtSigned(realizedPerItem)}/ea).`);
        $("#watcher-meta-last").textContent = new Date().toLocaleTimeString();
      } else {
        alert(`No open position for ${name}. Log the buy first (or use 📥 Buy if this was a buy that filled).`);
      }
    }
  }

  // Slot grid event delegation
  document.addEventListener("input", (e) => {
    const idx = e.target?.dataset?.slotLabel;
    if (idx == null) return;
    const i = +idx;
    if (!watcher.slots[i]) return;
    watcher.slots[i].itemName = e.target.value;
    saveSlotLabels();
  });
  document.addEventListener("click", (e) => {
    const b = e.target.closest("[data-slot-buy]");
    if (b) { slotAction(+b.dataset.slotBuy, "buy"); return; }
    const s = e.target.closest("[data-slot-sell]");
    if (s) { slotAction(+s.dataset.slotSell, "sell"); return; }
  });
  $("#watcher-slot-count")?.addEventListener("change", (e) => {
    watcher.slotCount = +e.target.value || 8;
    saveSlotCount();
    if (watcher.region && watcher.stream) {
      buildSlots();
      renderSlotGrid();
      watcher.prevFrameData = null; // reset diff
    }
  });

  async function startWatcher() {
    if (!navigator.mediaDevices?.getDisplayMedia) {
      alert("Your browser doesn't support screen capture.");
      return;
    }
    try {
      watcher.stream = await navigator.mediaDevices.getDisplayMedia({
        video: { frameRate: { ideal: 5, max: 10 } },
        audio: false,
      });
    } catch (e) {
      // User cancelled
      return;
    }
    watcher.video = $("#watcher-video");
    watcher.video.srcObject = watcher.stream;
    await new Promise(res => watcher.video.onloadedmetadata = res);
    await watcher.video.play().catch(() => {});

    // If stream ends (user clicks browser's "Stop sharing"), reset UI
    watcher.stream.getVideoTracks()[0].addEventListener("ended", () => stopWatcher());

    // Show crop UI to pick the GE region
    showCropModal();
  }

  function stopWatcher() {
    if (watcher.intervalId) { clearInterval(watcher.intervalId); watcher.intervalId = null; }
    if (watcher.stream) {
      watcher.stream.getTracks().forEach(t => t.stop());
      watcher.stream = null;
    }
    if (watcher.video) watcher.video.srcObject = null;
    watcher.prevFrameData = null;
    $("#watcher-toggle").hidden = false;
    $("#watcher-recrop").hidden = true;
    $("#watcher-stop").hidden = true;
    $("#watcher-body").hidden = true;
    $("#watcher-status").className = "watcher-status";
    $("#watcher-status").textContent = "Off — share your OSRS window to watch trades in-place";
  }

  function showCropModal() {
    const vw = watcher.video.videoWidth, vh = watcher.video.videoHeight;
    if (!vw || !vh) return;

    const root = $("#crop-root");
    root.innerHTML = `
      <div class="crop-backdrop" id="crop-backdrop">
        <div class="crop-container" onclick="event.stopPropagation()">
          <h3>Drag a box around your GE area</h3>
          <div class="hint">Include all your GE slots. Smaller box = faster capture and more sensitive change detection.</div>
          <div class="crop-area" id="crop-area">
            <video id="crop-preview" autoplay muted playsinline></video>
            <div class="crop-rect" id="crop-rect" hidden></div>
          </div>
          <div class="crop-actions">
            <button id="crop-cancel">Cancel</button>
            <button id="crop-save" class="primary" disabled>Use this region</button>
          </div>
        </div>
      </div>`;

    const preview = $("#crop-preview");
    preview.srcObject = watcher.stream;
    preview.play().catch(() => {});

    const area = $("#crop-area"), rectEl = $("#crop-rect");
    let dragStart = null, dragRect = null;

    area.addEventListener("mousedown", (e) => {
      const r = area.getBoundingClientRect();
      dragStart = { x: e.clientX - r.left, y: e.clientY - r.top };
      dragRect = { x: dragStart.x, y: dragStart.y, w: 0, h: 0 };
      rectEl.hidden = false;
      rectEl.style.left = dragStart.x + "px";
      rectEl.style.top = dragStart.y + "px";
      rectEl.style.width = "0px";
      rectEl.style.height = "0px";
    });
    area.addEventListener("mousemove", (e) => {
      if (!dragStart) return;
      const r = area.getBoundingClientRect();
      const x = e.clientX - r.left, y = e.clientY - r.top;
      const left = Math.min(dragStart.x, x), top = Math.min(dragStart.y, y);
      const w = Math.abs(x - dragStart.x), h = Math.abs(y - dragStart.y);
      rectEl.style.left = left + "px";
      rectEl.style.top = top + "px";
      rectEl.style.width = w + "px";
      rectEl.style.height = h + "px";
      dragRect = { x: left, y: top, w, h };
    });
    const finishDrag = () => {
      if (dragRect && dragRect.w > 10 && dragRect.h > 10) $("#crop-save").disabled = false;
      dragStart = null;
    };
    area.addEventListener("mouseup", finishDrag);
    area.addEventListener("mouseleave", finishDrag);

    $("#crop-cancel").addEventListener("click", () => {
      root.innerHTML = "";
      stopWatcher();
    });
    $("#crop-save").addEventListener("click", () => {
      if (!dragRect) return;
      const previewRect = preview.getBoundingClientRect();
      watcher.region = {
        x: dragRect.x / previewRect.width,
        y: dragRect.y / previewRect.height,
        w: dragRect.w / previewRect.width,
        h: dragRect.h / previewRect.height,
      };
      saveWatcherRegion();
      root.innerHTML = "";
      beginCaptureLoop();
    });
  }

  function beginCaptureLoop() {
    if (!watcher.region) return;
    watcher.captureCanvas = document.createElement("canvas");
    watcher.captureCtx = watcher.captureCanvas.getContext("2d", { willReadFrequently: true });
    watcher.thumbCanvas = $("#watcher-thumb");
    watcher.thumbCtx = watcher.thumbCanvas.getContext("2d");

    // Sync slot-count selector + build slot grid
    const sel = $("#watcher-slot-count");
    if (sel) sel.value = String(watcher.slotCount);
    buildSlots();
    renderSlotGrid();

    $("#watcher-toggle").hidden = true;
    $("#watcher-recrop").hidden = false;
    $("#watcher-stop").hidden = false;
    $("#watcher-body").hidden = false;
    $("#watcher-status").className = "watcher-status live";
    $("#watcher-status").textContent = "Live · watching " + watcher.slotCount + " slots";

    captureOnce();
    watcher.intervalId = setInterval(captureOnce, watcher.captureMs);
  }

  function captureOnce() {
    if (!watcher.video || !watcher.region) return;
    const v = watcher.video;
    const vw = v.videoWidth, vh = v.videoHeight;
    if (!vw || !vh) return;

    const sx = Math.floor(watcher.region.x * vw);
    const sy = Math.floor(watcher.region.y * vh);
    const sw = Math.max(1, Math.floor(watcher.region.w * vw));
    const sh = Math.max(1, Math.floor(watcher.region.h * vh));

    // Capture the full GE area
    watcher.captureCanvas.width = sw;
    watcher.captureCanvas.height = sh;
    watcher.captureCtx.drawImage(v, sx, sy, sw, sh, 0, 0, sw, sh);

    // Big thumbnail
    const tw = 320, th = Math.round(tw * sh / sw);
    watcher.thumbCanvas.width = tw;
    watcher.thumbCanvas.height = th;
    watcher.thumbCtx.drawImage(watcher.captureCanvas, 0, 0, tw, th);

    // Per-slot capture + diff
    for (let i = 0; i < watcher.slots.length; i++) {
      const slot = watcher.slots[i];
      const sub = slot.region;
      const ssx = Math.floor(sub.x * sw);
      const ssy = Math.floor(sub.y * sh);
      const ssw = Math.max(1, Math.floor(sub.w * sw));
      const ssh = Math.max(1, Math.floor(sub.h * sh));

      // Per-slot thumbnail
      const slotTw = 160;
      const slotTh = Math.max(20, Math.round(slotTw * ssh / ssw));
      slot.canvas.width = slotTw;
      slot.canvas.height = slotTh;
      slot.ctx.drawImage(watcher.captureCanvas, ssx, ssy, ssw, ssh, 0, 0, slotTw, slotTh);

      // Downsampled diff frame
      const dw = Math.min(40, ssw), dh = Math.min(40, ssh);
      const diffCanvas = document.createElement("canvas");
      diffCanvas.width = dw; diffCanvas.height = dh;
      const diffCtx = diffCanvas.getContext("2d", { willReadFrequently: true });
      diffCtx.drawImage(watcher.captureCanvas, ssx, ssy, ssw, ssh, 0, 0, dw, dh);
      const currentData = diffCtx.getImageData(0, 0, dw, dh);

      if (slot.prev) {
        const ratio = pixelDiff(slot.prev, currentData);
        if (ratio > 0.04) onSlotChanged(i, ratio);
      }
      slot.prev = currentData;
    }
  }

  function onSlotChanged(slotIdx, ratio) {
    const slot = watcher.slots[slotIdx];
    if (!slot) return;
    const now = Date.now();
    // Debounce per slot
    if (slot.lastChange && now - slot.lastChange < 3500) return;
    slot.lastChange = now;
    watcher.lastChangeTs = now;

    beep(660); setTimeout(() => beep(880), 120);

    const card = document.querySelector(`.slot-watch-card[data-slot="${slotIdx}"]`);
    if (card) {
      card.classList.remove("changed"); void card.offsetWidth; card.classList.add("changed");
      setTimeout(() => card.classList.remove("changed"), 3500);
    }
    const t = document.getElementById(`slot-time-${slotIdx}`);
    if (t) t.textContent = new Date(now).toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"});

    $("#watcher-meta-last").textContent = `Slot ${slotIdx + 1} @ ${new Date(now).toLocaleTimeString()}`;
    $("#watcher-status").className = "watcher-status changed";

      n.onclick = () => { window.focus(); n.close(); };

    }
  }

  function pixelDiff(prev, curr) {
    if (!prev || !curr || prev.data.length !== curr.data.length) return 1.0;
    let changed = 0;
    const data1 = prev.data, data2 = curr.data;
    const total = data1.length / 4;
    for (let i = 0; i < data1.length; i += 4) {
      const dr = Math.abs(data1[i] - data2[i]);
      const dg = Math.abs(data1[i+1] - data2[i+1]);
      const db = Math.abs(data1[i+2] - data2[i+2]);
      if (dr + dg + db > 35) changed++;
    }
    return changed / total;
  }

  function onChangeDetected(ratio) {

  // ===== CHART MODAL =====
  async function openItemChart(itemId, range = "5m") {
    itemId = +itemId;
    const meta = state.mapping[itemId];
    if (!meta) return;
    const cacheKey = itemId + ":" + range;
    let series = state.timeseriesCache[cacheKey];
    if (!series || (Date.now() - series.ts > 5 * 60 * 1000)) {
      try {
        const j = await fetchJSON(`/timeseries?id=${itemId}&timestep=${range}`);
        series = { data: j.data || [], ts: Date.now() };
        state.timeseriesCache[cacheKey] = series;
      } catch (e) {
        series = { data: [], ts: Date.now() };
      }
    }
    // Fire Jagex 180-day fetch in parallel (don't block modal render)
    fetchJagex180Day(itemId).then(() => {
      // Only redraw if the modal is still open AND is showing the same item we fetched for
      const open = $("#modal-backdrop");
      if (open && document.body.contains(open) && open.dataset.itemId === String(itemId)) {
        renderModal(itemId, meta, range, series.data);

  function renderModal(itemId, meta, range, data) {
    const valid = data.filter(d => d.avgHighPrice != null || d.avgLowPrice != null);
    const W = 700, H = 220, padL = 50, padR = 14, padT = 12, padB = 28;

    let chartSvg = "";
    if (!valid.length) {
      chartSvg = `<text x="${W/2}" y="${H/2}" fill="#5d6573" text-anchor="middle" font-size="12">No history available</text>`;
    } else {
      const allPrices = valid.flatMap(d => [d.avgHighPrice, d.avgLowPrice].filter(x => x != null));
      const minP = Math.min(...allPrices);
      const maxP = Math.max(...allPrices);
      const span = maxP - minP || 1;
      const yPad = span * 0.1;
      const yMin = minP - yPad, yMax = maxP + yPad;
      const t0 = valid[0].timestamp, t1 = valid[valid.length - 1].timestamp;
      const xSpan = (t1 - t0) || 1;
      const xAt = (t) => padL + (t - t0) / xSpan * (W - padL - padR);
      const yAt = (p) => padT + (1 - (p - yMin) / (yMax - yMin)) * (H - padT - padB);

      const pathFor = (key, color) => {
        const pts = valid.filter(d => d[key] != null).map(d => `${xAt(d.timestamp)},${yAt(d[key])}`);
        if (!pts.length) return "";
        return `<polyline fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" points="${pts.join(" ")}" />`;
      };

      // Y-axis gridlines
      const gridLines = [];
      const labels = [];
      const ticks = 4;
      for (let i = 0; i <= ticks; i++) {
        const y = padT + (H - padT - padB) * i / ticks;
        const v = yMax - (yMax - yMin) * i / ticks;
        gridLines.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="rgba(255,255,255,0.05)" />`);
        labels.push(`<text x="${padL - 6}" y="${y + 3}" fill="#5d6573" font-size="10" text-anchor="end">${fmtCompact(v)}</text>`);
      }

      // X-axis date labels (3 ticks)
      const xLabels = [];
      for (let i = 0; i <= 3; i++) {
        const t = t0 + (xSpan) * i / 3;
        const date = new Date(t * 1000);
        const lbl = range === "5m" ? date.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
                  : range === "1h" ? date.toLocaleDateString([], {month:"short",day:"numeric"}) + " " + date.toLocaleTimeString([], {hour:"2-digit"})
                  : date.toLocaleDateString([], {month:"short",day:"numeric"});
        xLabels.push(`<text x="${xAt(t)}" y="${H - 8}" fill="#5d6573" font-size="10" text-anchor="middle">${lbl}</text>`);
      }

      // Reference lines: 24h average high/low and your current Buy@
      const refLines = [];
      const d24 = state.prices24h[itemId];
      const cfgM = priceCfg();
      const pNow = state.prices[itemId];
      if (d24?.avgHighPrice && d24.avgHighPrice >= yMin && d24.avgHighPrice <= yMax) {
        const y = yAt(d24.avgHighPrice);
        refLines.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#f87171" stroke-width="1" stroke-dasharray="3,3" opacity="0.5" />`);
        refLines.push(`<text x="${W - padR - 4}" y="${y - 3}" fill="#f87171" font-size="9" text-anchor="end" opacity="0.85">24h avg sell</text>`);
      }
      if (d24?.avgLowPrice && d24.avgLowPrice >= yMin && d24.avgLowPrice <= yMax) {
        const y = yAt(d24.avgLowPrice);
        refLines.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#4ade80" stroke-width="1" stroke-dasharray="3,3" opacity="0.5" />`);
        refLines.push(`<text x="${W - padR - 4}" y="${y + 11}" fill="#4ade80" font-size="9" text-anchor="end" opacity="0.85">24h avg buy</text>`);
      }
      if (pNow?.low != null && pNow?.high != null) {
        const myBuyAt = pNow.low + buyBumpFor(pNow.low, pNow.high, cfgM);
        if (myBuyAt >= yMin && myBuyAt <= yMax) {
          const y = yAt(myBuyAt);
          refLines.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#fcd34d" stroke-width="1.4" stroke-dasharray="6,3" opacity="0.85" />`);
          refLines.push(`<text x="${padL + 4}" y="${y - 3}" fill="#fcd34d" font-size="10" font-weight="700">Your Buy@ ${fmt(myBuyAt)}</text>`);
        }
      }

      // Long-term anchor: 90-day average from Jagex daily data (independent source)
      const jagex = state.jagexCache[itemId]?.data || [];
      let longAvg = null;
      if (jagex.length) {
        const cutoff = Math.floor(Date.now() / 1000) - 90 * 86400;
        const recent90 = jagex.filter(d => d.ts >= cutoff);
        if (recent90.length) longAvg = recent90.reduce((s, d) => s + d.price, 0) / recent90.length;
      }
      if (longAvg != null && longAvg >= yMin && longAvg <= yMax) {
        const y = yAt(longAvg);
        refLines.push(`<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="2,4" opacity="0.7" />`);
        refLines.push(`<text x="${padL + 4}" y="${y + 10}" fill="#c4b5fd" font-size="9" opacity="0.9">90d avg (Jagex) ${fmtCompact(longAvg)}</text>`);
      }

      chartSvg = gridLines.join("") + labels.join("") + xLabels.join("")
              + refLines.join("")
              + pathFor("avgHighPrice", "#f87171")
              + pathFor("avgLowPrice",  "#4ade80");
    }

    // Current snapshot stats
    const p = state.prices[itemId] || {};
    const vol = state.volumes[itemId] || { buy: 0, sell: 0 };
    const cfgM = priceCfg();
    const mBuyAt  = (p.low != null && p.high != null) ? p.low + buyBumpFor(p.low, p.high, cfgM) : null;
    const mSellAt = (p.low != null && p.high != null) ? Math.max(mBuyAt, p.high - sellBumpFor(p.low, p.high, cfgM)) : null;
    const tax = mSellAt ? geTaxFor(itemId, mSellAt) : 0;
    const convFeeM = mBuyAt ? conversionFee(itemId, mBuyAt) : 0;
    const net = (mBuyAt != null && mSellAt != null) ? (mSellAt - tax - mBuyAt - convFeeM) : null;

    const html = `
      <div class="modal-backdrop" id="modal-backdrop" data-item-id="${itemId}">
        <div class="modal" onclick="event.stopPropagation()">
          <div class="modal-header">
            <div class="icon-wrap">${iconImg(meta.icon, 40)}</div>
            <div>
              <h3>${escapeHtml(meta.name)}<span class="badge ${meta.members ? 'p' : 'f'}">${meta.members ? 'P' : 'F'}</span></h3>
              <div class="sub">Item #${itemId} · GE limit ${meta.limit ? fmt(meta.limit) : "—"} · High alch ${meta.highalch ? fmt(meta.highalch) : "—"}</div>
            </div>
            <button class="modal-close" id="modal-close">✕</button>
          </div>
          <div class="chart-wrap">
            <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">${chartSvg}</svg>
            <div class="chart-legend">
              <span><span class="legend-dot" style="background:#f87171"></span>Sell (high)</span>
              <span><span class="legend-dot" style="background:#4ade80"></span>Buy (low)</span>
            </div>
            <div class="chart-range" id="chart-range">
              <button data-range="5m" class="${range === '5m' ? 'active' : ''}">~24h (5m)</button>
              <button data-range="1h" class="${range === '1h' ? 'active' : ''}">~12d (1h)</button>
              <button data-range="6h" class="${range === '6h' ? 'active' : ''}">~75d (6h)</button>
            </div>
          </div>
          <div class="modal-stats">
            <div class="stat"><div class="label">Buy (low)</div><div class="value">${fmt(p.low)}</div></div>
            <div class="stat"><div class="label">Sell (high)</div><div class="value">${fmt(p.high)}</div></div>
            <div class="stat"><div class="label">Net (after cut+tax${convFeeM ? '+fee' : ''})</div><div class="value ${net >= 0 ? 'pos' : 'neg'}">${fmtSigned(net)}</div></div>
            ${convFeeM ? `<div class="stat"><div class="label">Conversion fee (10%)</div><div class="value neg">−${fmt(convFeeM)}</div></div>` : ""}
            <div class="stat"><div class="label">Buy vol/hr</div><div class="value">${fmt(vol.buy)}</div></div>
            <div class="stat"><div class="label">Sell vol/hr</div><div class="value">${fmt(vol.sell)}</div></div>
            ${(() => {
              const d24m = state.prices24h[itemId];
              if (!d24m || !d24m.avgLowPrice || mBuyAt == null) return "";
              const pct = (mBuyAt - d24m.avgLowPrice) / d24m.avgLowPrice * 100;
              const cls = pct >= 5 ? "neg" : pct <= -3 ? "pos" : "dim";
              return `<div class="stat"><div class="label">Buy@ vs 24h avg</div><div class="value ${cls}">${pct >= 0 ? "+" : ""}${pct.toFixed(1)}%</div></div>`;
            })()}
          </div>
        </div>
      </div>`;
    $("#modal-root").innerHTML = html;

    $("#modal-backdrop").addEventListener("click", closeModal);
    $("#modal-close").addEventListener("click", closeModal);
    $("#chart-range").addEventListener("click", (e) => {
      const r = e.target.dataset.range;
      if (r) openItemChart(itemId, r);
    });
    document.addEventListener("keydown", escClose);
  }
  function closeModal() {
    $("#modal-root").innerHTML = "";
    document.removeEventListener("keydown", escClose);
  }
  function escClose(e) { if (e.key === "Escape") closeModal(); }

  // ===== REFRESH (tiered) =====
  // Fast tick (~6s): /latest + record history + rerender. Matches Flippr's pace.
  // Mid tick (~30s): /5m (intra-hour aggregates)
  // Slow tick (~60s): /1h + /24h (already covered by larger windows)
  async function fastTick() {
    if (fastTick._inFlight) return;     // re-entrancy guard: skip if a prior call hasn't finished
    fastTick._inFlight = true;
    try {
      await loadPrices();
      recordHistoryTick();
      renderActiveTab();
      state.nextRefreshAt = Date.now() + FAST_REFRESH_MS;
    } catch (e) {
      setStatus("Network error: " + e.message + " — retrying…", "err");

      fastTick._inFlight = false;
    }
  }
  async function midTick() {

  }
  async function slowTick() {
    try { await Promise.all([load1h(), load24h()]); } catch (e) {}
  }

  function updateRing() {

    const pct = 100 - (remaining / FAST_REFRESH_MS) * 100;
    $("#ring").style.setProperty("--p", pct.toFixed(1));
    $("#ring-text").textContent = Math.ceil(remaining / 1000) + "s";

  // ===== VIEW MODE (mobile vs desktop) =====
  const VIEW_KEY = "osrs-flipper-view-v1";
  function detectIsMobile() {
    const narrow = window.matchMedia("(max-width: 820px)").matches;
    const touch = ("ontouchstart" in window) || (navigator.maxTouchPoints > 0);
    const ua = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent || "");
    return narrow || (touch && ua);
  }
  function applyViewMode(mode) {
    document.body.classList.toggle("mobile-view", mode === "mobile");
    document.body.classList.toggle("desktop-view", mode === "desktop");
    const btn = $("#view-toggle");
    if (btn) {
      btn.textContent = mode === "mobile" ? "📱" : "💻";
      btn.title = `Current: ${mode}. Click to switch.`;

    // On mobile, controls start collapsed; on desktop always expanded.
    const controls = $("#flipping-controls");
    if (controls) controls.classList.toggle("collapsed", mode === "mobile");
  }
  function setViewMode(mode) {
    try { localStorage.setItem(VIEW_KEY, mode); } catch (e) {}
    applyViewMode(mode);
  }
  function showViewPicker(suggested) {
    const root = document.createElement("div");
    root.id = "view-picker-root";
    root.innerHTML = `
      <div class="view-picker-backdrop">
        <div class="view-picker">
          <h2>Pick your view</h2>
          <div class="sub">You can switch anytime from the 💻 / 📱 button in the header.</div>
          <div class="view-picker-options">
            <button class="view-picker-option ${suggested === 'desktop' ? 'suggested' : ''}" data-mode="desktop">
              <span class="vp-icon">💻</span>
              <div class="vp-title">Desktop</div>
              <div class="vp-desc">Wide tables, dense data, every column visible. Best with a big screen.</div>
              ${suggested === 'desktop' ? '<span class="vp-tag">Detected</span>' : ''}
            </button>
            <button class="view-picker-option ${suggested === 'mobile' ? 'suggested' : ''}" data-mode="mobile">
              <span class="vp-icon">📱</span>
              <div class="vp-title">Mobile</div>
              <div class="vp-desc">Stacked cards, big price pills, swipeable tabs. Optimised for phones.</div>
              ${suggested === 'mobile' ? '<span class="vp-tag">Detected</span>' : ''}
            </button>
          </div>
        </div>
      </div>`;
    document.body.appendChild(root);
    root.querySelectorAll("[data-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        setViewMode(btn.dataset.mode);
        root.remove();
        // After picking, re-render so anything mode-dependent updates
        try { renderActiveTab(); } catch (e) {}
      });
    });
  }
  function initViewMode() {
    let saved = null;
    try { saved = localStorage.getItem(VIEW_KEY); } catch (e) {}
    if (saved === "mobile" || saved === "desktop") {
      applyViewMode(saved);
    } else {
      const suggested = detectIsMobile() ? "mobile" : "desktop";
      applyViewMode(suggested); // apply pre-emptively so layout settles while picker is up
      // Defer the picker until the DOM is fully ready
      setTimeout(() => showViewPicker(suggested), 200);
    }
  }
  $("#view-toggle")?.addEventListener("click", () => {
    const next = document.body.classList.contains("mobile-view") ? "desktop" : "mobile";
    setViewMode(next);
    try { renderActiveTab(); } catch (e) {}
  });
  $("#mobile-filter-toggle")?.addEventListener("click", () => {
    const c = $("#flipping-controls");
    if (c) c.classList.toggle("collapsed");
  });

  (async function init() {
    try {
      loadSettings();
      // Apply restored active tab visually
      $$(".tab").forEach(t => t.classList.toggle("active", t.dataset.target === state.activeTab));
      $$(".tab-pane").forEach(p => p.hidden = p.dataset.tab !== state.activeTab);

      setStatus("Loading item catalog…", "warn");
      await loadMapping();
      setStatus("Catalog loaded · fetching prices…", "warn");
      await Promise.all([loadPrices(), load5m(), load1h(), load24h()]);
      recordHistoryTick();
      renderActiveTab();
      renderNews(); // Fire news fetch (won't block render)
      setInterval(renderNews, NEWS_CACHE_MS); // Re-poll hourly
      state.nextRefreshAt = Date.now() + FAST_REFRESH_MS;
      // Tiered polling
      setInterval(fastTick, FAST_REFRESH_MS);
      setInterval(midTick, MID_REFRESH_MS);
      setInterval(slowTick, SLOW_REFRESH_MS);

      // Pause polling when tab is hidden, resume + refresh when shown
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) { fastTick(); }
      });
    } catch (e) {
      setStatus("Init failed: " + e.message, "err");
    }
  })();
</script>
</body>
</html>
